<svg id="al-svg" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg"
     aria-label="Dijagram agentnog loopa: LLM iterira kroz pozivanje alata i primanje rezultata dok ne dostigne uvjet zaustavljanja">
  <title>Agentni loop — observe, reason, act</title>

  <defs>
    <marker id="al-arr-stone" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#78716C"/>
    </marker>
    <marker id="al-arr-coffee" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#B45309"/>
    </marker>
  </defs>

  <rect width="900" height="520" fill="#FAF9F6"/>

  <!-- Title -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.1s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <text x="450" y="40" font-family="Merriweather, Georgia, serif" font-size="20" font-weight="700" fill="#1C1917" text-anchor="middle">Agentni loop</text>
    <text x="450" y="62" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="13" fill="#78716C" text-anchor="middle">Observe · Reason · Act — sve dok model ne emituje finalni odgovor</text>
  </g>

  <!-- ZADATAK box -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="60" y="80" width="780" height="62" rx="8" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1"/>
    <rect x="60" y="80" width="3" height="62" rx="1.5" fill="#78716C"/>
    <text x="80" y="102" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#78716C" letter-spacing="0.8">ZADATAK</text>
    <text x="80" y="124" font-family="Merriweather, Georgia, serif" font-size="15" font-style="italic" fill="#1C1917">Višekoraki zadatak koji zahtijeva pristup vanjskim informacijama</text>
  </g>

  <!-- Arrow ZADATAK → LLM -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.7s" dur="0.3s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <line x1="245" y1="142" x2="245" y2="158" stroke="#78716C" stroke-width="1.5" marker-end="url(#al-arr-stone)"/>
  </g>

  <!-- LLM FOCAL box -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.9s" dur="0.5s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="60" y="165" width="370" height="215" rx="8" fill="#FDF6EC" stroke="#B45309" stroke-width="2"/>
    <rect x="60" y="165" width="3" height="215" rx="1.5" fill="#B45309"/>
    <text x="80" y="188" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#B45309" letter-spacing="0.8">MODEL (LLM)</text>
    <line x1="78" y1="196" x2="420" y2="196" stroke="#F0D9BB" stroke-width="0.7"/>
    <text x="80" y="218" font-family="Merriweather, Georgia, serif" font-size="14" font-style="italic" fill="#1C1917">Rasuđuje nad historijom razgovora</text>
    <text x="80" y="239" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#44403C">i odabira sljedeću akciju:</text>
    <line x1="78" y1="253" x2="420" y2="253" stroke="#E7C584" stroke-width="0.7"/>
    <text x="80" y="273" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#78716C">→  poziv alatu  (tool_use)</text>
    <text x="80" y="294" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#92400E">→  finalni odgovor  (end_turn)</text>
    <line x1="78" y1="309" x2="420" y2="309" stroke="#F0D9BB" stroke-width="0.7"/>
    <rect x="78" y="322" width="230" height="24" rx="12" fill="#FDF6EC" stroke="#E7C584" stroke-width="1"/>
    <text x="193" y="338" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#92400E" text-anchor="middle">↻  ponavljan dok nema end_turn</text>
  </g>

  <!-- Arrow LLM → HARNESS (tool_use) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.3s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <line x1="435" y1="205" x2="492" y2="205" stroke="#78716C" stroke-width="1.5" marker-end="url(#al-arr-stone)"/>
    <text x="463" y="198" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="10" fill="#78716C" text-anchor="middle">tool_use</text>
  </g>

  <!-- HARNESS box -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.7s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="500" y="165" width="340" height="95" rx="8" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1.5"/>
    <rect x="500" y="165" width="3" height="95" rx="1.5" fill="#78716C"/>
    <text x="521" y="187" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#78716C" letter-spacing="0.8">HARNESS</text>
    <text x="521" y="209" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#44403C">Detektira signal, izvršava poziv alatu,</text>
    <text x="521" y="228" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#44403C">dodaje tool_result u historiju</text>
    <text x="521" y="248" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#A8A29E">neparametarski scaffolding oko modela</text>
  </g>

  <!-- Arrow HARNESS → ALATI -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.1s" dur="0.3s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <line x1="670" y1="268" x2="670" y2="287" stroke="#78716C" stroke-width="1.5" marker-end="url(#al-arr-stone)"/>
  </g>

  <!-- ALATI box -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.3s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="500" y="295" width="340" height="95" rx="8" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1.5"/>
    <rect x="500" y="295" width="3" height="95" rx="1.5" fill="#78716C"/>
    <text x="521" y="317" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#78716C" letter-spacing="0.8">ALATI</text>
    <text x="521" y="339" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#44403C">Vanjski API, baza podataka, pretraživač,</text>
    <text x="521" y="358" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#44403C">file system — svaki poziv → tool_result</text>
    <text x="521" y="378" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#A8A29E">definisani JSON schema-om u tools nizu</text>
  </g>

  <!-- Loop-back: ALATI → LLM (tool_result) — coffee primary path -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.7s" dur="0.5s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <path d="M 500,342 H 455 V 190 H 438" stroke="#B45309" stroke-width="2" fill="none" marker-end="url(#al-arr-coffee)"/>
    <text x="462" y="278" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="10" fill="#78716C" text-anchor="middle" transform="rotate(-90 462 278)">tool_result</text>
    <!-- Loop badge on vertical segment -->
    <rect x="444" y="248" width="28" height="20" rx="10" fill="#FDF6EC" stroke="#B45309" stroke-width="1"/>
    <text x="458" y="262" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#B45309" text-anchor="middle">↺</text>
  </g>

  <!-- Exit arrow LLM → ODGOVOR -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.2s" dur="0.3s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <line x1="245" y1="380" x2="245" y2="397" stroke="#B45309" stroke-width="2" marker-end="url(#al-arr-coffee)"/>
    <text x="253" y="391" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="10" fill="#92400E">finalni odgovor</text>
  </g>

  <!-- ODGOVOR output box -->
  <g opacity="0">
    <animateTransform attributeName="transform" type="translate" from="0 8" to="0 0" begin="3.5s" dur="0.5s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <animate attributeName="opacity" from="0" to="1" begin="3.5s" dur="0.5s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="60" y="405" width="780" height="80" rx="8" fill="#FDF6EC" stroke="#B45309" stroke-width="1"/>
    <rect x="60" y="405" width="3" height="80" rx="1.5" fill="#B45309"/>
    <text x="80" y="427" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#B45309" letter-spacing="0.8">ODGOVOR</text>
    <text x="80" y="450" font-family="Merriweather, Georgia, serif" font-size="14" font-style="italic" fill="#1C1917">Model emitovao end_turn — zadatak dovršen</text>
    <text x="80" y="470" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#78716C">uvjeti zaustavljanja: end_turn · max_turns · token budžet · human-in-the-loop</text>
  </g>

  <!-- Replay button -->
  <g class="replay-btn" style="cursor:pointer; opacity:0; transition: opacity 0.2s ease;"
     role="button" tabindex="0" aria-label="Pusti animaciju ponovo">
    <circle cx="855" cy="40" r="16" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1"/>
    <path d="M 855 31 A 9 9 0 1 1 846 40" fill="none" stroke="#78716C" stroke-width="1.5" stroke-linecap="round"/>
    <polygon points="852,28 858,28 855,33" fill="#78716C"/>
    <title>Pusti ponovo</title>
  </g>

  <style>
    #al-svg:hover .replay-btn { opacity: 1; }
    #al-svg .replay-btn:hover circle { fill: #FDF6EC; stroke: #B45309; }
    #al-svg .replay-btn:hover path { stroke: #B45309; }
    #al-svg .replay-btn:hover polygon { fill: #B45309; }
    #al-svg .replay-btn:focus { outline: none; opacity: 1; }
    #al-svg .replay-btn:focus circle { stroke: #B45309; stroke-width: 2; }
    @media (prefers-reduced-motion: reduce) {
      #al-svg animate,
      #al-svg animateTransform { display: none; }
      #al-svg .replay-btn { display: none; }
    }
  </style>

  <script>
  // <![CDATA[
  (function () {
    var svg = document.getElementById('al-svg');
    var btn = svg && svg.querySelector('.replay-btn');
    if (!svg || !btn) return;
    function replay() { if (typeof svg.setCurrentTime === 'function') svg.setCurrentTime(0); }
    btn.addEventListener('click', replay);
    btn.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); replay(); }
    });
  })();
  // ]]>
  </script>

</svg>
