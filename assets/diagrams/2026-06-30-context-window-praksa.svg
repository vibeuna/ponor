<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Inter, system-ui, -apple-system, sans-serif" id="cwp-svg" aria-label="U-kriva tačnosti kontekstnog prozora: visoka tačnost na pozicijama 1 i 20, niska u sredini">

  <!-- Background -->
  <rect width="900" height="620" fill="#FAF9F6"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="Merriweather, Georgia, serif" font-size="20" font-weight="700" fill="#1C1917">Gdje je dokument u kontekstu?</text>
  <text x="450" y="66" text-anchor="middle" font-size="13" fill="#78716C">Tačnost modela pada u sredini — prema Liu i dr. (2023), TACL</text>

  <!-- INPUT BOX -->
  <rect x="60" y="82" width="780" height="62" rx="8" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1"/>
  <rect x="60" y="82" width="3" height="62" fill="#78716C"/>
  <text x="80" y="99" font-size="11" font-weight="700" fill="#78716C" letter-spacing="0.8">KONTEKST</text>
  <text x="80" y="125" font-size="14" fill="#1C1917" font-style="italic" font-family="Merriweather, Georgia, serif">"20 dokumenata. Jedan tačan odgovor. Na kojoj poziciji se nalazi?"</text>

  <!-- Stone connector arrow -->
  <line x1="450" y1="152" x2="450" y2="176" stroke="#78716C" stroke-width="1.5"/>
  <polygon points="445,174 450,184 455,174" fill="#78716C"/>

  <!-- Center label -->
  <text x="450" y="204" text-anchor="middle" font-size="13" font-weight="600" fill="#44403C">Tačnost pronalaska po poziciji dokumenta</text>

  <!-- Scale ticks (static) -->
  <line x1="220" y1="220" x2="220" y2="432" stroke="#E7E5E4" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="450" y1="220" x2="450" y2="432" stroke="#E7E5E4" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="680" y1="220" x2="680" y2="432" stroke="#E7E5E4" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Bar labels — static, left side -->
  <g font-size="13">
    <text x="210" y="245" text-anchor="end" font-weight="700" fill="#1C1917">Pozicija 1</text>
    <text x="210" y="289" text-anchor="end" font-weight="500" fill="#44403C">Pozicija 5</text>
    <text x="210" y="333" text-anchor="end" font-weight="500" fill="#44403C">Pozicija 10</text>
    <text x="210" y="377" text-anchor="end" font-weight="500" fill="#44403C">Pozicija 15</text>
    <text x="210" y="421" text-anchor="end" font-weight="700" fill="#1C1917">Pozicija 20</text>
  </g>

  <!-- BARS — animated width from 0 -->

  <!-- Bar 1: Pozicija 1 (coffee, focal — 71%) -->
  <rect class="b1" x="220" y="228" width="0" height="26" rx="4" fill="#B45309">
    <animate attributeName="width" from="0" to="327" begin="0.3s" dur="0.8s" fill="freeze"
             calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" values="0;327"/>
  </rect>

  <!-- Bar 2: Pozicija 5 (neutral — 55%) -->
  <rect class="b2" x="220" y="272" width="0" height="26" rx="4" fill="#A8A29E">
    <animate attributeName="width" from="0" to="253" begin="0.5s" dur="0.7s" fill="freeze"
             calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" values="0;253"/>
  </rect>

  <!-- Bar 3: Pozicija 10 (neutral — 48%, shortest) -->
  <rect class="b3" x="220" y="316" width="0" height="26" rx="4" fill="#A8A29E">
    <animate attributeName="width" from="0" to="221" begin="0.65s" dur="0.6s" fill="freeze"
             calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" values="0;221"/>
  </rect>

  <!-- Bar 4: Pozicija 15 (neutral — 53%) -->
  <rect class="b4" x="220" y="360" width="0" height="26" rx="4" fill="#A8A29E">
    <animate attributeName="width" from="0" to="244" begin="0.8s" dur="0.65s" fill="freeze"
             calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" values="0;244"/>
  </rect>

  <!-- Bar 5: Pozicija 20 (coffee, focal — 70%) -->
  <rect class="b5" x="220" y="404" width="0" height="26" rx="4" fill="#B45309">
    <animate attributeName="width" from="0" to="322" begin="0.9s" dur="0.8s" fill="freeze"
             calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" values="0;322"/>
  </rect>

  <!-- PERCENTAGE LABELS — animated opacity -->
  <text class="anim-pct" x="555" y="245" font-size="13" font-weight="700" fill="#92400E" opacity="0">71%
    <animate attributeName="opacity" from="0" to="1" begin="1.1s" dur="0.3s" fill="freeze"/>
  </text>
  <text class="anim-pct" x="481" y="289" font-size="12" font-weight="500" fill="#57534E" opacity="0">55%
    <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.3s" fill="freeze"/>
  </text>
  <text class="anim-pct" x="449" y="333" font-size="12" font-weight="500" fill="#57534E" opacity="0">48%
    <animate attributeName="opacity" from="0" to="1" begin="1.25s" dur="0.3s" fill="freeze"/>
  </text>
  <text class="anim-pct" x="472" y="377" font-size="12" font-weight="500" fill="#57534E" opacity="0">53%
    <animate attributeName="opacity" from="0" to="1" begin="1.45s" dur="0.3s" fill="freeze"/>
  </text>
  <text class="anim-pct" x="550" y="421" font-size="13" font-weight="700" fill="#92400E" opacity="0">70%
    <animate attributeName="opacity" from="0" to="1" begin="1.7s" dur="0.3s" fill="freeze"/>
  </text>

  <!-- ZONE ANNOTATION — bracket + label (animated) -->
  <g class="anim-pct" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.3s" dur="0.4s" fill="freeze"/>
    <line x1="750" y1="276" x2="750" y2="382" stroke="#D6D3D1" stroke-width="1"/>
    <line x1="745" y1="276" x2="755" y2="276" stroke="#D6D3D1" stroke-width="1"/>
    <line x1="745" y1="382" x2="755" y2="382" stroke="#D6D3D1" stroke-width="1"/>
    <text x="758" y="333" font-size="10" font-style="italic" fill="#78716C">Nesigurna zona</text>
  </g>

  <!-- Scale labels (static) -->
  <g font-size="10" fill="#78716C" text-anchor="middle">
    <text x="220" y="448">0%</text>
    <text x="450" y="448">50%</text>
    <text x="680" y="448">100%</text>
  </g>

  <!-- DECISION ARROW — animated opacity -->
  <g class="anim-group" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.9s" dur="0.4s" fill="freeze"/>
    <line x1="450" y1="460" x2="450" y2="484" stroke="#B45309" stroke-width="2"/>
    <polygon points="444,482 450,492 456,482" fill="#B45309"/>
  </g>

  <!-- OUTPUT BOX — animated opacity + rise -->
  <g class="anim-group" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.5s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="0 8" to="0 0"
                      begin="2.2s" dur="0.5s" fill="freeze"
                      calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" values="0 8;0 0"/>
    <rect x="60" y="496" width="780" height="76" rx="8" fill="#FDF6EC" stroke="#B45309" stroke-width="1"/>
    <rect x="60" y="496" width="3" height="76" fill="#B45309"/>
    <text x="80" y="514" font-size="11" font-weight="700" fill="#B45309" letter-spacing="0.8">ZAKLJUČAK</text>
    <text x="80" y="536" font-size="14" fill="#1C1917" font-style="italic" font-family="Merriweather, Georgia, serif">"Puni kontekstni prozor nije ravnopravna memorija.</text>
    <text x="80" y="557" font-size="14" font-style="italic" font-family="Merriweather, Georgia, serif">
      <tspan fill="#1C1917">Rubovi su pouzdani — </tspan><tspan font-weight="700" fill="#92400E">sredina nije.</tspan><tspan fill="#1C1917">"</tspan>
    </text>
  </g>

  <!-- Footnote -->
  <text font-size="11" fill="#78716C" font-style="italic">
    <tspan x="60" y="590">Podaci prema Liu i dr. (2023), TACL. Vrijednosti su ilustrativne — stvarni rezultati variraju po modelu i zadatku.</tspan>
  </text>

  <!-- REPLAY BUTTON -->
  <g class="replay-btn" style="cursor:pointer; opacity:0; transition: opacity 0.2s ease;" role="button" tabindex="0" aria-label="Pusti animaciju ponovo">
    <circle cx="855" cy="40" r="16" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1"/>
    <path d="M 855 31 A 9 9 0 1 1 846 40" fill="none" stroke="#78716C" stroke-width="1.5" stroke-linecap="round"/>
    <polygon points="852,28 858,28 855,33" fill="#78716C"/>
    <title>Pusti ponovo</title>
  </g>

  <style>
    #cwp-svg:hover .replay-btn { opacity: 1; }
    #cwp-svg .replay-btn:hover circle { fill: #FDF6EC; stroke: #B45309; }
    #cwp-svg .replay-btn:hover path { stroke: #B45309; }
    #cwp-svg .replay-btn:hover polygon { fill: #B45309; }
    #cwp-svg .replay-btn:focus { outline: none; opacity: 1; }
    #cwp-svg .replay-btn:focus circle { stroke: #B45309; stroke-width: 2; }
    @media (prefers-reduced-motion: reduce) {
      #cwp-svg animate, #cwp-svg animateTransform { display: none; }
      #cwp-svg .replay-btn { display: none; }
      #cwp-svg .b1 { width: 327px; }
      #cwp-svg .b2 { width: 253px; }
      #cwp-svg .b3 { width: 221px; }
      #cwp-svg .b4 { width: 244px; }
      #cwp-svg .b5 { width: 322px; }
      #cwp-svg .anim-pct { opacity: 1; }
      #cwp-svg .anim-group { opacity: 1; }
    }
  </style>

  <script>
    // <![CDATA[
    (function () {
      const svg = document.getElementById('cwp-svg');
      const btn = svg && svg.querySelector('.replay-btn');
      if (!svg || !btn) return;
      function replay() {
        if (typeof svg.setCurrentTime === 'function') svg.setCurrentTime(0);
      }
      btn.addEventListener('click', replay);
      btn.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); replay(); }
      });
    })();
    // ]]>
  </script>

</svg>
