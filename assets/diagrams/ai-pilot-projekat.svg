<svg id="ai-pilot-svg" viewBox="0 0 900 710" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif" role="img" aria-labelledby="ai-pilot-title ai-pilot-desc">
  <title id="ai-pilot-title">Dva puta odobravanja AI pilot projekta</title>
  <desc id="ai-pilot-desc">Poređenje: pilot odobren na osjećaj, bez provjere, tiho nestaje; pilot odobren uz osam-stavki checklist stiže do odluke o produkciji.</desc>

  <defs>
    <marker id="apArrowStone" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#78716C"/>
    </marker>
    <marker id="apArrowCoffee" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#B45309"/>
    </marker>
  </defs>

  <style>
    #ai-pilot-svg .replay-btn { cursor: pointer; opacity: 0; transition: opacity 0.2s ease; }
    #ai-pilot-svg:hover .replay-btn { opacity: 1; }
    #ai-pilot-svg .replay-btn:hover circle { fill: #FDF6EC; stroke: #B45309; }
    #ai-pilot-svg .replay-btn:hover path { stroke: #B45309; }
    #ai-pilot-svg .replay-btn:hover polygon { fill: #B45309; }
    #ai-pilot-svg .replay-btn:focus { outline: none; opacity: 1; }
    #ai-pilot-svg .replay-btn:focus circle { stroke: #B45309; stroke-width: 2; }
    @media (prefers-reduced-motion: reduce) {
      #ai-pilot-svg animate,
      #ai-pilot-svg animateTransform { display: none; }
      #ai-pilot-svg .replay-btn { display: none; }
    }
  </style>

  <rect width="900" height="710" fill="#FAF9F6"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" font-family="Merriweather, Georgia, serif" font-size="20" font-weight="700" fill="#1C1917">Dva puta odobravanja istog AI pilota</text>
  <text x="450" y="56" text-anchor="middle" font-size="13" fill="#78716C">Isti prijedlog, dva različita sastanka</text>

  <!-- ROW 1: bez checklist-e -->
  <g id="ap-row1-label" opacity="0">
    <text x="60" y="86" font-size="12" font-weight="600" letter-spacing="0.5" fill="#78716C">ODOBRENO NA OSJEĆAJ</text>
    <text x="60" y="108" font-family="Merriweather, Georgia, serif" font-style="italic" font-size="14" fill="#1C1917">"Demo je impresivan. Odobravamo budžet i tri mjeseca."</text>
    <animate attributeName="opacity" from="0" to="1" begin="0.1s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" values="0;1"/>
  </g>

  <g id="ap-row1-empty" opacity="0">
    <rect x="60" y="122" width="780" height="40" rx="8" fill="#FAF9F6" stroke="#A8A29E" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="450" y="147" text-anchor="middle" font-family="Merriweather, Georgia, serif" font-style="italic" font-size="12" fill="#78716C">— nijedno od osam pitanja nije postavljeno —</text>
    <animate attributeName="opacity" from="0" to="1" begin="0.4s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" values="0;1"/>
  </g>

  <g id="ap-arrow1" opacity="0">
    <line x1="450" y1="170" x2="450" y2="192" stroke="#78716C" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#apArrowStone)"/>
    <animate attributeName="opacity" from="0" to="1" begin="0.8s" dur="0.3s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" values="0;1"/>
  </g>

  <g id="ap-outcome1" opacity="0">
    <rect x="290" y="200" width="320" height="56" rx="8" fill="#F5F5F0" stroke="#A8A29E" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="310" y="220" font-size="11" font-weight="700" letter-spacing="0.8" fill="#78716C">ISHOD</text>
    <text x="310" y="240" font-family="Merriweather, Georgia, serif" font-style="italic" font-size="13.5" fill="#1C1917">Pilot tiho nestaje za par mjeseci.</text>
    <text x="310" y="256" font-style="italic" font-size="11" fill="#78716C">Niko to formalno ne evaluira.</text>
    <animate attributeName="opacity" from="0" to="1" begin="1.05s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" values="0;1"/>
    <animate attributeName="opacity" from="1" to="0.45" begin="2.0s" dur="1s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" values="1;0.45"/>
  </g>

  <!-- Divider -->
  <line x1="60" y1="290" x2="60" y2="290" stroke="#E7E5E4" stroke-width="1">
    <animate attributeName="x2" from="60" to="840" begin="1.5s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" values="60;840"/>
  </line>

  <!-- ROW 2: sa checklist-om -->
  <g id="ap-row2-label" opacity="0">
    <text x="60" y="316" font-size="12" font-weight="600" letter-spacing="0.5" fill="#B45309">ODOBRENO SA CHECKLIST-OM</text>
    <text x="60" y="338" font-family="Merriweather, Georgia, serif" font-style="italic" font-size="14" fill="#1C1917">"Osam pitanja, jedan sastanak, prije potpisa."</text>
    <animate attributeName="opacity" from="0" to="1" begin="1.9s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" values="0;1"/>
  </g>

  <!-- Chip grid: 8 checklist items -->
  <g id="ap-chip-1" opacity="0">
    <rect x="60" y="354" width="180" height="42" rx="8" fill="#FDF6EC" stroke="#B45309" stroke-width="1"/>
    <circle cx="82" cy="375" r="12" fill="#B45309"/>
    <text x="82" y="379" text-anchor="middle" font-size="12" font-weight="700" fill="#FDF6EC">1</text>
    <text x="100" y="379" font-size="10.5" font-weight="700" letter-spacing="0.2" fill="#92400E">MJERLJIV ISHOD</text>
    <animate attributeName="opacity" from="0" to="1" begin="2.20s" dur="0.3s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" values="0;1"/>
  </g>

  <g id="ap-chip-2" opacity="0">
    <rect x="260" y="354" width="180" height="42" rx="8" fill="#FDF6EC" stroke="#B45309" stroke-width="1"/>
    <circle cx="282" cy="375" r="12" fill="#B45309"/>
    <text x="282" y="379" text-anchor="middle" font-size="12" font-weight="700" fill="#FDF6EC">2</text>
    <text x="300" y="379" font-size="10.5" font-weight="700" letter-spacing="0.2" fill="#92400E">PODACI SPREMNI</text>
    <animate attributeName="opacity" from="0" to="1" begin="2.31s" dur="0.3s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" values="0;1"/>
  </g>

  <g id="ap-chip-3" opacity="0">
    <rect x="460" y="354" width="180" height="42" rx="8" fill="#FDF6EC" stroke="#B45309" stroke-width="1"/>
    <circle cx="482" cy="375" r="12" fill="#B45309"/>
    <text x="482" y="379" text-anchor="middle" font-size="12" font-weight="700" fill="#FDF6EC">3</text>
    <text x="500" y="379" font-size="10.5" font-weight="700" letter-spacing="0.2" fill="#92400E">VLASNIŠTVO</text>
    <animate attributeName="opacity" from="0" to="1" begin="2.42s" dur="0.3s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" values="0;1"/>
  </g>

  <g id="ap-chip-4" opacity="0">
    <rect x="660" y="354" width="180" height="42" rx="8" fill="#FDF6EC" stroke="#B45309" stroke-width="1"/>
    <circle cx="682" cy="375" r="12" fill="#B45309"/>
    <text x="682" y="379" text-anchor="middle" font-size="12" font-weight="700" fill="#FDF6EC">4</text>
    <text x="700" y="379" font-size="10.5" font-weight="700" letter-spacing="0.2" fill="#92400E">HUMAN-IN-THE-LOOP</text>
    <animate attributeName="opacity" from="0" to="1" begin="2.53s" dur="0.3s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" values="0;1"/>
  </g>

  <g id="ap-chip-5" opacity="0">
    <rect x="60" y="408" width="180" height="42" rx="8" fill="#FDF6EC" stroke="#B45309" stroke-width="1"/>
    <circle cx="82" cy="429" r="12" fill="#B45309"/>
    <text x="82" y="433" text-anchor="middle" font-size="12" font-weight="700" fill="#FDF6EC">5</text>
    <text x="100" y="433" font-size="10.5" font-weight="700" letter-spacing="0.2" fill="#92400E">TROŠKOVNI MODEL</text>
    <animate attributeName="opacity" from="0" to="1" begin="2.64s" dur="0.3s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" values="0;1"/>
  </g>

  <g id="ap-chip-6" opacity="0">
    <rect x="260" y="408" width="180" height="42" rx="8" fill="#FDF6EC" stroke="#B45309" stroke-width="1"/>
    <circle cx="282" cy="429" r="12" fill="#B45309"/>
    <text x="282" y="433" text-anchor="middle" font-size="12" font-weight="700" fill="#FDF6EC">6</text>
    <text x="300" y="433" font-size="10.5" font-weight="700" letter-spacing="0.2" fill="#92400E">VENDOR LOCK-IN</text>
    <animate attributeName="opacity" from="0" to="1" begin="2.75s" dur="0.3s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" values="0;1"/>
  </g>

  <g id="ap-chip-7" opacity="0">
    <rect x="460" y="408" width="180" height="42" rx="8" fill="#FDF6EC" stroke="#B45309" stroke-width="1"/>
    <circle cx="482" cy="429" r="12" fill="#B45309"/>
    <text x="482" y="433" text-anchor="middle" font-size="12" font-weight="700" fill="#FDF6EC">7</text>
    <text x="500" y="433" font-size="10.5" font-weight="700" letter-spacing="0.2" fill="#92400E">REGULATORNI STATUS</text>
    <animate attributeName="opacity" from="0" to="1" begin="2.86s" dur="0.3s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" values="0;1"/>
  </g>

  <g id="ap-chip-8" opacity="0">
    <rect x="660" y="408" width="180" height="42" rx="8" fill="#FDF6EC" stroke="#B45309" stroke-width="1"/>
    <circle cx="682" cy="429" r="12" fill="#B45309"/>
    <text x="682" y="433" text-anchor="middle" font-size="12" font-weight="700" fill="#FDF6EC">8</text>
    <text x="700" y="433" font-size="10.5" font-weight="700" letter-spacing="0.2" fill="#92400E">ROK IZLASKA</text>
    <animate attributeName="opacity" from="0" to="1" begin="2.97s" dur="0.3s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" values="0;1"/>
  </g>

  <g id="ap-arrow2" opacity="0">
    <line x1="450" y1="458" x2="450" y2="480" stroke="#B45309" stroke-width="2" marker-end="url(#apArrowCoffee)"/>
    <animate attributeName="opacity" from="0" to="1" begin="3.35s" dur="0.3s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" values="0;1"/>
  </g>

  <g id="ap-output" opacity="0" transform="translate(0,8)">
    <rect x="60" y="488" width="780" height="64" rx="8" fill="#FDF6EC" stroke="#B45309" stroke-width="1"/>
    <rect x="60" y="488" width="3" height="64" fill="#B45309"/>
    <text x="80" y="507" font-size="11" font-weight="700" letter-spacing="0.8" fill="#B45309">IZLAZ</text>
    <text x="80" y="530" font-family="Merriweather, Georgia, serif" font-style="italic" font-size="15" fill="#1C1917">Stiže do odluke o produkciji — na vrijeme, sa jasnim razlogom.</text>
    <animate attributeName="opacity" from="0" to="1" begin="3.6s" dur="0.5s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" values="0;1"/>
    <animateTransform attributeName="transform" type="translate" from="0 8" to="0 0" begin="3.6s" dur="0.5s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" values="0 8;0 0"/>
  </g>

  <g id="ap-panel" opacity="0" transform="translate(0,8)">
    <rect x="60" y="576" width="780" height="112" rx="8" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1"/>
    <rect x="80" y="594" width="3" height="14" fill="#B45309"/>
    <text x="92" y="606" font-family="Merriweather, Georgia, serif" font-size="13" font-weight="700" fill="#1C1917">Zašto ovih osam pitanja</text>
    <text x="80" y="628" font-size="12" fill="#44403C">Razlika rijetko leži u tome koji je LLM izabran ili koji je vendor u pitanju.</text>
    <text x="80" y="646" font-size="12" fill="#44403C">Leži u tome da li su ova pitanja postavljena na prvom sastanku, prije potpisa.</text>
    <text x="80" y="670" font-style="italic" font-size="12" fill="#78716C">Checklist se prolazi u istom sastanku na kojem se traži budžet — ne u zasebnom projektu.</text>
    <animate attributeName="opacity" from="0" to="1" begin="4.0s" dur="0.5s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" values="0;1"/>
    <animateTransform attributeName="transform" type="translate" from="0 8" to="0 0" begin="4.0s" dur="0.5s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" values="0 8;0 0"/>
  </g>

  <!-- Replay button -->
  <g class="replay-btn" role="button" tabindex="0" aria-label="Pusti animaciju ponovo">
    <circle cx="855" cy="40" r="16" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1"/>
    <path d="M 855 31 A 9 9 0 1 1 846 40" fill="none" stroke="#78716C" stroke-width="1.5" stroke-linecap="round"/>
    <polygon points="852,28 858,28 855,33" fill="#78716C"/>
    <title>Pusti ponovo</title>
  </g>

  <script>
  // <![CDATA[
  (function () {
    var svg = document.getElementById('ai-pilot-svg');
    var btn = svg && svg.querySelector('.replay-btn');
    if (!svg || !btn) return;
    function replay() { if (typeof svg.setCurrentTime === 'function') svg.setCurrentTime(0); }
    btn.addEventListener('click', replay);
    btn.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); replay(); }
    });
  })();
  // ]]>
  </script>
</svg>
