<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
  <!-- Background -->
  <rect width="1000" height="600" rx="40" fill="#2a5298"/>

  <!-- Icon group
       Raw icon bounding box:
         horizontal: x 350–650, X_mid = 500 → no horizontal shift needed
         vertical: top of tallest bar y=360, baseline y=620, Y_mid = 490
         translate = (500-500, -(200+(490-500))) = (0, -190)
  -->
  <g transform="translate(0, -190)">

    <!-- Icon: rising bar chart with 4 bars of increasing height -->

    <!-- Bar 1 — shortest (left) -->
    <rect
      x="350" y="520"
      width="60" height="100"
      rx="10"
      fill="#fafaf8"
      stroke="#1a1a1a"
      stroke-width="15"
      stroke-linejoin="round"
    />

    <!-- Bar 2 -->
    <rect
      x="430" y="470"
      width="60" height="150"
      rx="10"
      fill="#d6dff0"
      stroke="#1a1a1a"
      stroke-width="15"
      stroke-linejoin="round"
    />

    <!-- Bar 3 -->
    <rect
      x="510" y="420"
      width="60" height="200"
      rx="10"
      fill="#fafaf8"
      stroke="#1a1a1a"
      stroke-width="15"
      stroke-linejoin="round"
    />

    <!-- Bar 4 — tallest (right) -->
    <rect
      x="590" y="360"
      width="60" height="260"
      rx="10"
      fill="#d6dff0"
      stroke="#1a1a1a"
      stroke-width="15"
      stroke-linejoin="round"
    />

    <!-- Upward-trend dot above tallest bar — signals monitoring/signal -->
    <circle
      cx="620" cy="332"
      r="22"
      fill="#1a1a1a"
    />
    <circle
      cx="612" cy="325"
      r="7"
      fill="#fafaf8"
    />

    <!-- Baseline -->
    <line
      x1="335" y1="620"
      x2="665" y2="620"
      stroke="#1a1a1a"
      stroke-width="15"
      stroke-linecap="round"
    />

  </g>
</svg>
