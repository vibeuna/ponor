<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
  <!-- Background -->
  <rect width="1000" height="600" rx="40" fill="#5a7a8a"/>

  <!-- Icon: AI chip — body with die and connector pins, centred at (500,300) -->
  <g>
    <!-- Pins: top -->
    <line x1="445" y1="190" x2="445" y2="150" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round"/>
    <line x1="500" y1="190" x2="500" y2="150" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round"/>
    <line x1="555" y1="190" x2="555" y2="150" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round"/>
    <!-- Pins: bottom -->
    <line x1="445" y1="410" x2="445" y2="450" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round"/>
    <line x1="500" y1="410" x2="500" y2="450" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round"/>
    <line x1="555" y1="410" x2="555" y2="450" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round"/>
    <!-- Pins: left -->
    <line x1="390" y1="245" x2="350" y2="245" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round"/>
    <line x1="390" y1="300" x2="350" y2="300" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round"/>
    <line x1="390" y1="355" x2="350" y2="355" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round"/>
    <!-- Pins: right -->
    <line x1="610" y1="245" x2="650" y2="245" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round"/>
    <line x1="610" y1="300" x2="650" y2="300" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round"/>
    <line x1="610" y1="355" x2="650" y2="355" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round"/>

    <!-- Chip body -->
    <rect x="390" y="190" width="220" height="220" rx="24" fill="#fafaf8" stroke="#1a1a1a" stroke-width="18" stroke-linejoin="round"/>

    <!-- Die -->
    <rect x="450" y="250" width="100" height="100" rx="12" fill="#d6dff0" stroke="#1a1a1a" stroke-width="10" stroke-linejoin="round"/>
  </g>
</svg>
