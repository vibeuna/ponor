<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
  <!-- Background -->
  <rect width="1000" height="600" rx="40" fill="#4a9e8e"/>

  <!-- Icon group — CENTERING RULE:
       Three stacked layers representing the CLAUDE.md scope hierarchy:
         global (~/.claude/CLAUDE.md) → project (./CLAUDE.md) → subdirectory
       Raw icon bounding box:
         Bottom layer:  x=340–660, y=560–620
         Middle layer:  x=360–640, y=470–530
         Top layer:     x=380–620, y=380–440
         Overall: left=340, right=660, top=380, bottom=620
         X_mid = (340+660)/2 = 500
         Y_mid = (380+620)/2 = 500
         translate = (500-500, -(200+(500-500))) = (0, -200)
  -->
  <g transform="translate(0, -200)">

    <!-- Icon: three stacked horizontal layers (scope hierarchy) -->

    <!-- Bottom layer — global scope (~/.claude/CLAUDE.md), widest -->
    <rect
      x="340" y="560"
      width="320" height="60"
      rx="14"
      fill="#fafaf8"
      stroke="#1a1a1a"
      stroke-width="16"
      stroke-linejoin="round"
    />
    <!-- Content lines on bottom layer -->
    <line x1="374" y1="585" x2="480" y2="585" stroke="#1a1a1a" stroke-width="11" stroke-linecap="round"/>
    <line x1="374" y1="605" x2="540" y2="605" stroke="#d6dff0" stroke-width="11" stroke-linecap="round"/>

    <!-- Middle layer — project scope (./CLAUDE.md), medium -->
    <rect
      x="360" y="470"
      width="280" height="60"
      rx="14"
      fill="#d6dff0"
      stroke="#1a1a1a"
      stroke-width="16"
      stroke-linejoin="round"
    />
    <!-- Content lines on middle layer -->
    <line x1="394" y1="495" x2="490" y2="495" stroke="#1a1a1a" stroke-width="11" stroke-linecap="round"/>
    <line x1="394" y1="515" x2="560" y2="515" stroke="#1a1a1a" stroke-width="11" stroke-linecap="round"/>

    <!-- Top layer — subdirectory scope (./src/payments/CLAUDE.md), narrowest -->
    <rect
      x="380" y="380"
      width="240" height="60"
      rx="14"
      fill="#fafaf8"
      stroke="#1a1a1a"
      stroke-width="16"
      stroke-linejoin="round"
    />
    <!-- Content lines on top layer -->
    <line x1="414" y1="405" x2="500" y2="405" stroke="#1a1a1a" stroke-width="11" stroke-linecap="round"/>
    <line x1="414" y1="425" x2="570" y2="425" stroke="#d6dff0" stroke-width="11" stroke-linecap="round"/>

    <!-- Small downward arrow between layers to hint at hierarchy / inheritance flow -->
    <!-- Arrow shaft between top and middle -->
    <line x1="500" y1="443" x2="500" y2="467" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round"/>
    <polyline points="488,458 500,470 512,458" fill="none" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Arrow shaft between middle and bottom -->
    <line x1="500" y1="533" x2="500" y2="557" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round"/>
    <polyline points="488,548 500,560 512,548" fill="none" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  </g>
</svg>
