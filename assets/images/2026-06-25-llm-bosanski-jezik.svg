<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
  <!-- Background -->
  <rect width="1000" height="600" rx="40" fill="#2a5298"/>

  <!-- Icon group — raw design centred at (490, 500), translated to (500, 300) on canvas
       Bounding box raw: x≈[325,665], y≈[410,590] → X_mid=495, Y_mid=500
       Translate: (500-495, -(200+(500-500))) = (5, -200) -->
  <g transform="translate(5, -200)">

    <!-- Icon: word fragmenting into subword pieces (BPE tokenization concept) -->

    <!-- Left fragment — smaller piece, drifting upper-left, rotated -14° around its centre (375, 435) -->
    <g transform="rotate(-14, 375, 435)">
      <rect x="305" y="405" width="140" height="60"
            rx="12"
            fill="#d6dff0" stroke="#1a1a1a" stroke-width="16"
            stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Crack gap marker: short diagonal line on right edge to suggest the break -->
      <line x1="443" y1="410" x2="447" y2="460"
            stroke="#1a1a1a" stroke-width="8"
            stroke-linecap="round" stroke-dasharray="6 5"/>
    </g>

    <!-- Right fragment — smaller piece, drifting lower-right, rotated 10° around its centre (615, 555) -->
    <g transform="rotate(10, 615, 555)">
      <rect x="545" y="525" width="140" height="60"
            rx="12"
            fill="#d6dff0" stroke="#1a1a1a" stroke-width="16"
            stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Crack gap marker on left edge -->
      <line x1="547" y1="530" x2="543" y2="580"
            stroke="#1a1a1a" stroke-width="8"
            stroke-linecap="round" stroke-dasharray="6 5"/>
    </g>

    <!-- Central main fragment — the original word block, slightly rotated, breaking apart -->
    <g transform="rotate(-3, 490, 500)">
      <rect x="390" y="460" width="200" height="80"
            rx="14"
            fill="#fafaf8" stroke="#1a1a1a" stroke-width="18"
            stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Vertical crack line through the block — suggests fracture/split point -->
      <line x1="460" y1="462" x2="455" y2="538"
            stroke="#1a1a1a" stroke-width="10"
            stroke-linecap="round" stroke-dasharray="8 6"/>
      <line x1="530" y1="462" x2="535" y2="538"
            stroke="#1a1a1a" stroke-width="10"
            stroke-linecap="round" stroke-dasharray="8 6"/>
    </g>

    <!-- Small divergence arrows — hint at the splitting motion -->
    <!-- Arrow upper-left -->
    <line x1="440" y1="454" x2="415" y2="432"
          stroke="#fafaf8" stroke-width="6"
          stroke-linecap="round" stroke-opacity="0.7"/>
    <!-- Arrow lower-right -->
    <line x1="555" y1="548" x2="578" y2="568"
          stroke="#fafaf8" stroke-width="6"
          stroke-linecap="round" stroke-opacity="0.7"/>

  </g>
</svg>
