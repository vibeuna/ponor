<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
  <!-- Background -->
  <rect width="1000" height="600" rx="40" fill="#2E4A3E"/>

  <!-- Icon group
       Raw icon bounding box:
         Document body: x=360–600, y=340–620
         Magnifier handle tip: x=658, y=632
         Overall: left=360, right=658, top=340, bottom=632
         X_mid = (360+658)/2 = 509, Y_mid = (340+632)/2 = 486
         translate = (500-509, -(200+(486-500))) = (-9, -186) ≈ (-9, -186)
  -->
  <g transform="translate(-9, -186)">

    <!-- Icon: index document with search -->

    <!-- Document body — stacked list / index card -->
    <rect
      x="360" y="340"
      width="240" height="280"
      rx="18"
      fill="#fafaf8"
      stroke="#1a1a1a"
      stroke-width="16"
      stroke-linejoin="round"
    />

    <!-- Index line 1 (top) -->
    <line
      x1="395" y1="410"
      x2="565" y2="410"
      stroke="#1a1a1a"
      stroke-width="15"
      stroke-linecap="round"
    />

    <!-- Index line 2 (middle) -->
    <line
      x1="395" y1="460"
      x2="545" y2="460"
      stroke="#d6dff0"
      stroke-width="15"
      stroke-linecap="round"
    />

    <!-- Index line 3 (lower) -->
    <line
      x1="395" y1="510"
      x2="555" y2="510"
      stroke="#1a1a1a"
      stroke-width="15"
      stroke-linecap="round"
    />

    <!-- Magnifying glass — circle lens, overlapping bottom-right of document -->
    <!-- Lens circle -->
    <circle
      cx="578" cy="560"
      r="58"
      fill="#d6dff0"
      stroke="#1a1a1a"
      stroke-width="16"
    />

    <!-- Handle -->
    <line
      x1="622" y1="604"
      x2="658" y2="640"
      stroke="#1a1a1a"
      stroke-width="20"
      stroke-linecap="round"
    />

    <!-- Small cross/plus inside lens to suggest search activity -->
    <line
      x1="560" y1="560"
      x2="596" y2="560"
      stroke="#1a1a1a"
      stroke-width="10"
      stroke-linecap="round"
    />
    <line
      x1="578" y1="542"
      x2="578" y2="578"
      stroke="#1a1a1a"
      stroke-width="10"
      stroke-linecap="round"
    />

  </g>
</svg>
