<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
  <!-- Background -->
  <rect width="1000" height="600" rx="40" fill="#c8996a"/>

  <!-- Icon: checkpoint gate with raised, striped boom barrier -->
  <g>
    <!-- Left post -->
    <rect x="330" y="190" width="60" height="220" rx="16" fill="#fafaf8" stroke="#1a1a1a" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right post -->
    <rect x="610" y="190" width="60" height="220" rx="16" fill="#fafaf8" stroke="#1a1a1a" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Boom barrier arm, pivoted at left post, raised at an angle (controlled/partial access) -->
    <g transform="rotate(-32 360 220)">
      <rect x="360" y="204" width="330" height="32" rx="16" fill="#fafaf8" stroke="#1a1a1a" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Stripe details on the arm -->
      <rect x="415" y="210" width="20" height="20" rx="4" fill="#1a1a1a"/>
      <rect x="470" y="210" width="20" height="20" rx="4" fill="#1a1a1a"/>
      <rect x="525" y="210" width="20" height="20" rx="4" fill="#1a1a1a"/>
      <rect x="580" y="210" width="20" height="20" rx="4" fill="#1a1a1a"/>
    </g>

    <!-- Pivot hub on left post -->
    <circle cx="360" cy="220" r="16" fill="#d6dff0" stroke="#1a1a1a" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Small indicator light on right post -->
    <circle cx="640" cy="230" r="14" fill="#d6dff0" stroke="#1a1a1a" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
