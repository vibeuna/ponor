<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
  <!-- Background -->
  <rect width="1000" height="600" rx="40" fill="#3f5f9e"/>

  <!-- Icon group
       Raw icon bounds: left=370, right=570, top=230, bottom=450
       X_mid = (370+570)/2 = 470 → x-translate = 500-470 = 30
       Y_mid = (230+450)/2 = 340 → y-translate = -(200+(340-500)) = -(200-160) = -40
       Final: translate(30, -40) -->
  <g transform="translate(30, -40)" stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round">

    <!-- Music note: single eighth note (quaver) -->

    <!-- Notehead — filled ellipse, tilted ~-20deg -->
    <ellipse cx="410" cy="430" rx="52" ry="36"
             transform="rotate(-20 410 430)"
             fill="#fafaf8" stroke="#1a1a1a" stroke-width="16"/>

    <!-- Stem — vertical line up from right of notehead -->
    <line x1="455" y1="405" x2="455" y2="240"
          fill="none" stroke="#1a1a1a" stroke-width="18"/>

    <!-- Flag — a single curved flag from top of stem -->
    <path d="M455,240 C510,255 530,290 500,340"
          fill="none" stroke="#1a1a1a" stroke-width="16"/>

    <!-- Small sound-wave arcs to the right, hinting at audio -->
    <path d="M515,300 C535,280 535,320 515,340"
          fill="none" stroke="#fafaf8" stroke-width="10" opacity="0.7"/>
    <path d="M545,285 C575,260 575,340 545,355"
          fill="none" stroke="#fafaf8" stroke-width="10" opacity="0.5"/>

  </g>
</svg>
