<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
  <!-- Background -->
  <rect width="1000" height="600" rx="40" fill="#2a5298"/>

  <!-- Icon group
       Icon shapes designed with visual centre at (500, 500) in raw coords.
       translate(0, -200) shifts that centre to (500, 300) on the canvas.
       Circular arrow: arc centred at (500, 500), radius 160.
       Arc spans from ~105° to ~30° going clockwise (about 285° sweep).
       Bounding box: (500-160, 500-160) to (500+160, 500+160) = (340,340)–(660,660).
       Visual centre Y = (340+660)/2 = 500. Visual centre X = (340+660)/2 = 500. Correct. -->
  <g transform="translate(0, -200)">

    <!-- Main circular arrow arc
         Centre (500,500), radius 160.
         Arc from 105° to 30° clockwise = start at 105°, end at 30°.
         105° in radians: start point = (500 + 160*cos(105°), 500 + 160*sin(105°))
           cos(105°) ≈ -0.2588, sin(105°) ≈ 0.9659
           start ≈ (458.6, 654.5)
         30° end point = (500 + 160*cos(30°), 500 + 160*sin(30°))
           cos(30°) ≈ 0.8660, sin(30°) ≈ 0.5
           end ≈ (638.6, 580.0)
         Large arc flag = 1 (because sweep > 180°), sweep = 1 (clockwise). -->
    <path
      d="M 458.6 654.5 A 160 160 0 1 1 638.6 580.0"
      fill="none"
      stroke="#fafaf8"
      stroke-width="18"
      stroke-linecap="round"
    />

    <!-- Arrowhead at end of arc (pointing roughly in the direction of the arc tangent at 30°).
         At 30° on the circle, the tangent direction (clockwise) is perpendicular to radius,
         pointing in direction (30° + 90°) = 120°.
         Arrow tip at (638.6, 580.0).
         Tangent direction vector: (cos(120°), sin(120°)) = (-0.5, 0.866)
         Left wing: tip + rotate -35° from tangent * 36px
           rotate -35° of (−0.5, 0.866): angle = 120−35 = 85°
           cos(85°)≈0.0872, sin(85°)≈0.9962 → point = (638.6+0.0872*36, 580.0+0.9962*36) = (641.7, 615.9)
         Right wing: tip + rotate +35° from tangent * 36px
           rotate +35°: angle = 120+35 = 155°
           cos(155°)≈-0.9063, sin(155°)≈0.4226 → point = (638.6−0.9063*36, 580.0+0.4226*36) = (605.9, 595.2) -->
    <polygon
      points="638.6,580.0 641.7,615.9 605.9,595.2"
      fill="#fafaf8"
      stroke="#fafaf8"
      stroke-width="4"
      stroke-linejoin="round"
    />

    <!-- Node dot at the start of the arc (105°) — the "current step" marker -->
    <!-- Start point (458.6, 654.5) -->
    <circle cx="458.6" cy="654.5" r="22" fill="#fafaf8" stroke="#1a1a1a" stroke-width="5"/>

    <!-- Secondary node dot at 210° — bottom of loop
         cos(210°) = -0.866, sin(210°) = -0.5
         point = (500 + 160*(-0.866), 500 + 160*(-0.5)) = (361.4, 420.0) -->
    <circle cx="361.4" cy="420.0" r="14" fill="#d6dff0" stroke="#1a1a1a" stroke-width="4"/>

    <!-- Secondary node dot at 330° — upper right area
         cos(330°) = 0.866, sin(330°) = -0.5
         point = (500 + 160*0.866, 500 + 160*(-0.5)) = (638.6, 420.0) -->
    <circle cx="638.6" cy="420.0" r="14" fill="#d6dff0" stroke="#1a1a1a" stroke-width="4"/>

    <!-- Small spark dot at top of arc (270°) = (500, 500-160) = (500, 340) -->
    <circle cx="500" cy="340" r="10" fill="#d6dff0" stroke="#1a1a1a" stroke-width="3"/>

  </g>
</svg>
