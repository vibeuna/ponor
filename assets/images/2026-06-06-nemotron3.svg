<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
  <!-- Background -->
  <rect width="1000" height="600" rx="40" fill="#2D1B4E"/>

  <!-- Icon group — sparse MoE network, designed in 1000x1000 space, translated up to centre in 600px height -->
  <g transform="translate(0, -220)">

    <!-- ===================== EDGES ===================== -->
    <!-- Inactive edges — dim, thin -->

    <!-- Left col → Middle col (inactive) -->
    <line x1="300" y1="340" x2="460" y2="320" stroke="#fafaf8" stroke-width="4" stroke-linecap="round" opacity="0.18"/>
    <line x1="300" y1="340" x2="460" y2="480" stroke="#fafaf8" stroke-width="4" stroke-linecap="round" opacity="0.18"/>
    <line x1="300" y1="500" x2="460" y2="320" stroke="#fafaf8" stroke-width="4" stroke-linecap="round" opacity="0.18"/>
    <line x1="300" y1="500" x2="460" y2="480" stroke="#fafaf8" stroke-width="4" stroke-linecap="round" opacity="0.18"/>
    <line x1="300" y1="660" x2="460" y2="480" stroke="#fafaf8" stroke-width="4" stroke-linecap="round" opacity="0.18"/>
    <line x1="300" y1="660" x2="460" y2="640" stroke="#fafaf8" stroke-width="4" stroke-linecap="round" opacity="0.18"/>
    <line x1="300" y1="500" x2="460" y2="640" stroke="#fafaf8" stroke-width="4" stroke-linecap="round" opacity="0.18"/>

    <!-- Middle col → Right col (inactive) -->
    <line x1="460" y1="320" x2="620" y2="400" stroke="#fafaf8" stroke-width="4" stroke-linecap="round" opacity="0.18"/>
    <line x1="460" y1="480" x2="620" y2="560" stroke="#fafaf8" stroke-width="4" stroke-linecap="round" opacity="0.18"/>
    <line x1="460" y1="640" x2="620" y2="560" stroke="#fafaf8" stroke-width="4" stroke-linecap="round" opacity="0.18"/>
    <line x1="460" y1="640" x2="620" y2="720" stroke="#fafaf8" stroke-width="4" stroke-linecap="round" opacity="0.18"/>

    <!-- Right col → Output col (inactive) -->
    <line x1="620" y1="400" x2="740" y2="480" stroke="#fafaf8" stroke-width="4" stroke-linecap="round" opacity="0.18"/>
    <line x1="620" y1="560" x2="740" y2="480" stroke="#fafaf8" stroke-width="4" stroke-linecap="round" opacity="0.18"/>
    <line x1="620" y1="560" x2="740" y2="640" stroke="#fafaf8" stroke-width="4" stroke-linecap="round" opacity="0.18"/>
    <line x1="620" y1="720" x2="740" y2="640" stroke="#fafaf8" stroke-width="4" stroke-linecap="round" opacity="0.18"/>

    <!-- Active edges — thick, bright, drawn on top -->
    <line x1="300" y1="340" x2="460" y2="320" stroke="#fafaf8" stroke-width="14" stroke-linecap="round" opacity="0.90"/>
    <line x1="460" y1="320" x2="620" y2="400" stroke="#fafaf8" stroke-width="14" stroke-linecap="round" opacity="0.90"/>
    <line x1="620" y1="400" x2="740" y2="480" stroke="#fafaf8" stroke-width="14" stroke-linecap="round" opacity="0.90"/>
    <!-- One branching active path -->
    <line x1="300" y1="500" x2="460" y2="480" stroke="#fafaf8" stroke-width="14" stroke-linecap="round" opacity="0.90"/>
    <line x1="460" y1="480" x2="620" y2="400" stroke="#fafaf8" stroke-width="14" stroke-linecap="round" opacity="0.90"/>

    <!-- ===================== INACTIVE NODES ===================== -->
    <!-- Left column -->
    <circle cx="300" cy="500" r="20" fill="#d6dff0" stroke="#1a1a1a" stroke-width="8" opacity="0.30"/>
    <circle cx="300" cy="660" r="20" fill="#d6dff0" stroke="#1a1a1a" stroke-width="8" opacity="0.30"/>

    <!-- Middle column -->
    <circle cx="460" cy="640" r="22" fill="#d6dff0" stroke="#1a1a1a" stroke-width="8" opacity="0.30"/>

    <!-- Right column -->
    <circle cx="620" cy="560" r="22" fill="#d6dff0" stroke="#1a1a1a" stroke-width="8" opacity="0.30"/>
    <circle cx="620" cy="720" r="22" fill="#d6dff0" stroke="#1a1a1a" stroke-width="8" opacity="0.30"/>

    <!-- Output column -->
    <circle cx="740" cy="640" r="22" fill="#d6dff0" stroke="#1a1a1a" stroke-width="8" opacity="0.30"/>

    <!-- ===================== ACTIVE NODES ===================== -->
    <!-- Left column — active input -->
    <circle cx="300" cy="340" r="28" fill="#fafaf8" stroke="#1a1a1a" stroke-width="14" stroke-linejoin="round"/>

    <!-- Middle column — active hidden -->
    <circle cx="460" cy="320" r="28" fill="#fafaf8" stroke="#1a1a1a" stroke-width="14" stroke-linejoin="round"/>
    <circle cx="460" cy="480" r="28" fill="#fafaf8" stroke="#1a1a1a" stroke-width="14" stroke-linejoin="round"/>

    <!-- Right column — active expert -->
    <circle cx="620" cy="400" r="30" fill="#fafaf8" stroke="#1a1a1a" stroke-width="16" stroke-linejoin="round"/>

    <!-- Output — active output node -->
    <circle cx="740" cy="480" r="28" fill="#fafaf8" stroke="#1a1a1a" stroke-width="14" stroke-linejoin="round"/>

    <!-- Inner fill accent on active nodes (secondary light blue tint) -->
    <circle cx="300" cy="340" r="13" fill="#d6dff0"/>
    <circle cx="460" cy="320" r="13" fill="#d6dff0"/>
    <circle cx="460" cy="480" r="13" fill="#d6dff0"/>
    <circle cx="620" cy="400" r="15" fill="#d6dff0"/>
    <circle cx="740" cy="480" r="13" fill="#d6dff0"/>

  </g>
</svg>
