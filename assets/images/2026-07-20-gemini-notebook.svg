<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
  <!-- Background -->
  <rect width="1000" height="600" rx="40" fill="#7f8a52"/>

  <!-- Icon: terminal window (native code execution in a per-notebook sandbox) -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- Terminal window body -->
    <rect x="280" y="150" width="440" height="300" rx="24"
          fill="#fafaf8" stroke="#1a1a1a" stroke-width="18"/>

    <!-- Title bar divider -->
    <line x1="280" y1="222" x2="720" y2="222" stroke="#1a1a1a" stroke-width="10"/>

    <!-- Three window-control dots -->
    <circle cx="322" cy="186" r="12" fill="#7f8a52" stroke="#1a1a1a" stroke-width="7"/>
    <circle cx="362" cy="186" r="12" fill="#d6dff0" stroke="#1a1a1a" stroke-width="7"/>
    <circle cx="402" cy="186" r="12" fill="#fafaf8" stroke="#1a1a1a" stroke-width="7"/>

    <!-- Prompt chevron -->
    <polyline points="360,300 408,336 360,372"
              fill="none" stroke="#1a1a1a" stroke-width="20"/>

    <!-- Command / cursor bar -->
    <rect x="446" y="316" width="150" height="40" rx="10"
          fill="#d6dff0" stroke="#1a1a1a" stroke-width="14"/>
  </g>
</svg>
