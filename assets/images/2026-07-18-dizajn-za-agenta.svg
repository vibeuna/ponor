<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
  <!-- Background -->
  <rect width="1000" height="600" rx="40" fill="#3c7c8a"/>

  <!-- Icon: hub — one central node (the single control plane / source of truth)
       with spokes radiating to six outer nodes. Centred at (500, 300),
       plain group, no transform; coordinates designed directly in 1000x600. -->
  <g stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round">
    <!-- Spokes (drawn first so node bodies cover their ends) -->
    <line x1="500" y1="300" x2="668" y2="300" stroke-width="12"/>
    <line x1="500" y1="300" x2="584" y2="446" stroke-width="12"/>
    <line x1="500" y1="300" x2="416" y2="446" stroke-width="12"/>
    <line x1="500" y1="300" x2="332" y2="300" stroke-width="12"/>
    <line x1="500" y1="300" x2="416" y2="154" stroke-width="12"/>
    <line x1="500" y1="300" x2="584" y2="154" stroke-width="12"/>

    <!-- Outer nodes -->
    <circle cx="668" cy="300" r="30" fill="#fafaf8" stroke-width="14"/>
    <circle cx="584" cy="446" r="30" fill="#fafaf8" stroke-width="14"/>
    <circle cx="416" cy="446" r="30" fill="#fafaf8" stroke-width="14"/>
    <circle cx="332" cy="300" r="30" fill="#fafaf8" stroke-width="14"/>
    <circle cx="416" cy="154" r="30" fill="#fafaf8" stroke-width="14"/>
    <circle cx="584" cy="154" r="30" fill="#fafaf8" stroke-width="14"/>

    <!-- Central node — the hub: larger, off-white body with a light-blue core -->
    <circle cx="500" cy="300" r="58" fill="#fafaf8" stroke-width="18"/>
    <circle cx="500" cy="300" r="24" fill="#d6dff0" stroke-width="10"/>
  </g>
</svg>
