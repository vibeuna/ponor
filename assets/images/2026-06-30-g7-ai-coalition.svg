<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
  <!-- Background -->
  <rect width="1000" height="600" rx="40" fill="#4a9e8e"/>

  <!-- Icon group — icon designed in raw coords.
       Globe circle centred at (500, 500), r=170 → bounding box y: 330–670.
       Abstract dots above at y≈295–310.
       Full vertical span: 295–670, Y_mid = (295+670)/2 = 482.5.
       translate(0, -(200 + (482.5-500))) = translate(0, -182.5) → translate(0, -183).
       X_mid = 500 → x offset = 0. -->
  <g transform="translate(0, -183)">

    <!-- Icon: globe — represents international coalition and governance framing -->

    <!-- Globe body (main circle) -->
    <circle
      cx="500" cy="500"
      r="170"
      fill="#fafaf8"
      stroke="#1a1a1a"
      stroke-width="18"
    />

    <!-- Globe inner tint (hemisphere shading) -->
    <ellipse
      cx="500" cy="500"
      rx="170" ry="170"
      fill="#d6dff0"
      clip-path="url(#right-half)"
    />
    <clipPath id="right-half">
      <rect x="500" y="330" width="170" height="340"/>
    </clipPath>

    <!-- Horizontal equator line -->
    <line
      x1="330" y1="500"
      x2="670" y2="500"
      stroke="#1a1a1a"
      stroke-width="14"
      stroke-linecap="round"
    />

    <!-- Vertical prime meridian ellipse -->
    <ellipse
      cx="500" cy="500"
      rx="85" ry="170"
      fill="none"
      stroke="#1a1a1a"
      stroke-width="14"
    />

    <!-- Upper latitude band (curved arc) -->
    <path
      d="M 340 445 Q 500 415 660 445"
      fill="none"
      stroke="#1a1a1a"
      stroke-width="12"
      stroke-linecap="round"
    />

    <!-- Lower latitude band (curved arc) -->
    <path
      d="M 340 555 Q 500 585 660 555"
      fill="none"
      stroke="#1a1a1a"
      stroke-width="12"
      stroke-linecap="round"
    />

    <!-- Globe outline (drawn last to clean up any overshoot) -->
    <circle
      cx="500" cy="500"
      r="170"
      fill="none"
      stroke="#1a1a1a"
      stroke-width="18"
    />

    <!-- Abstract element: three connection dots above globe (hint at coalition / network) -->
    <!-- Left dot -->
    <circle cx="440" cy="306" r="13" fill="#1a1a1a"/>
    <!-- Centre dot (top) -->
    <circle cx="500" cy="292" r="16" fill="#1a1a1a"/>
    <!-- Right dot -->
    <circle cx="560" cy="306" r="13" fill="#1a1a1a"/>

    <!-- Short connector lines from dots down to globe rim -->
    <line x1="440" y1="319" x2="452" y2="333" stroke="#1a1a1a" stroke-width="9" stroke-linecap="round"/>
    <line x1="500" y1="308" x2="500" y2="330" stroke="#1a1a1a" stroke-width="9" stroke-linecap="round"/>
    <line x1="560" y1="319" x2="548" y2="333" stroke="#1a1a1a" stroke-width="9" stroke-linecap="round"/>

  </g>
</svg>
