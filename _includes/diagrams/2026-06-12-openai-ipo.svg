<svg id="vendor-dep-svg" viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <marker id="vd-arr-coffee" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 8 4, 0 8" fill="#B45309"/>
    </marker>
    <marker id="vd-arr-stone" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 8 4, 0 8" fill="#78716C"/>
    </marker>
  </defs>

  <style>
    @media (prefers-reduced-motion: reduce) {
      #vendor-dep-svg animate,
      #vendor-dep-svg animateTransform { display: none; }
      #vendor-dep-svg .anim { opacity: 1 !important; }
      #vendor-dep-svg .replay-btn { display: none; }
    }
    #vendor-dep-svg:hover .replay-btn { opacity: 1; }
    #vendor-dep-svg .replay-btn:hover circle { fill: #FDF6EC; stroke: #B45309; }
    #vendor-dep-svg .replay-btn:hover path { stroke: #B45309; }
    #vendor-dep-svg .replay-btn:hover polygon { fill: #B45309; }
    #vendor-dep-svg .replay-btn:focus { outline: none; opacity: 1; }
    #vendor-dep-svg .replay-btn:focus circle { stroke: #B45309; stroke-width: 2; }
  </style>

  <!-- Background -->
  <rect width="900" height="560" fill="#FAF9F6"/>

  <!-- Title block -->
  <text x="450" y="38" text-anchor="middle"
        font-family="Merriweather, Georgia, serif" font-size="20" font-weight="700" fill="#1C1917">
    Zavisnost od vendora: dva nivoa
  </text>
  <text x="450" y="60" text-anchor="middle"
        font-family="Inter, system-ui, -apple-system, sans-serif" font-size="13" fill="#78716C">
    Iza svakog AI vendora stoji cloud hyperscaler — sa kapitalskim udjelom
  </text>

  <!-- Column divider -->
  <line x1="450" y1="74" x2="450" y2="397" stroke="#E7E5E4" stroke-width="1"/>

  <!-- Column header: OPENAI (coffee) -->
  <g class="anim" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.4s" fill="freeze"
             calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="80" y="74" width="290" height="22" rx="4" fill="#FDF6EC" stroke="#B45309" stroke-width="1"/>
    <text x="225" y="89" text-anchor="middle"
          font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" font-weight="700"
          letter-spacing="0.8" fill="#B45309">OPENAI</text>
  </g>

  <!-- Column header: ANTHROPIC (neutral) -->
  <g class="anim" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.4s" dur="0.4s" fill="freeze"
             calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="530" y="74" width="290" height="22" rx="4" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1"/>
    <text x="675" y="89" text-anchor="middle"
          font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" font-weight="700"
          letter-spacing="0.8" fill="#78716C">ANTHROPIC</text>
  </g>

  <!-- ====== ROW 1: ENTERPRISE KUPAC ====== -->
  <g class="anim" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.4s" fill="freeze"
             calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="60" y="105" width="330" height="58" rx="8" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1.5"/>
    <rect x="60" y="105" width="3" height="58" rx="1" fill="#78716C"/>
    <text x="80" y="123" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11"
          font-weight="700" letter-spacing="0.8" fill="#78716C">ENTERPRISE KUPAC</text>
    <text x="80" y="145" font-family="Merriweather, Georgia, serif" font-size="14"
          font-style="italic" fill="#1C1917">Vaš tim ili vaš produkt</text>
  </g>

  <g class="anim" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.7s" dur="0.4s" fill="freeze"
             calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="510" y="105" width="330" height="58" rx="8" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1.5"/>
    <rect x="510" y="105" width="3" height="58" rx="1" fill="#78716C"/>
    <text x="530" y="123" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11"
          font-weight="700" letter-spacing="0.8" fill="#78716C">ENTERPRISE KUPAC</text>
    <text x="530" y="145" font-family="Merriweather, Georgia, serif" font-size="14"
          font-style="italic" fill="#1C1917">Vaš tim ili vaš produkt</text>
  </g>

  <!-- Arrows: Enterprise → Vendor -->
  <g class="anim" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.0s" dur="0.3s" fill="freeze"
             calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <line x1="225" y1="163" x2="225" y2="194" stroke="#B45309" stroke-width="2"
          stroke-linecap="round" marker-end="url(#vd-arr-coffee)"/>
    <text x="233" y="182" font-family="Inter, system-ui, -apple-system, sans-serif"
          font-size="10" fill="#B45309">plaća za API</text>
  </g>

  <g class="anim" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.1s" dur="0.3s" fill="freeze"
             calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <line x1="675" y1="163" x2="675" y2="194" stroke="#78716C" stroke-width="1.5"
          stroke-linecap="round" marker-end="url(#vd-arr-stone)"/>
    <text x="683" y="182" font-family="Inter, system-ui, -apple-system, sans-serif"
          font-size="10" fill="#78716C">plaća za API</text>
  </g>

  <!-- ====== ROW 2: MODEL VENDOR ====== -->
  <!-- OpenAI: COFFEE FOCAL ELEMENT -->
  <g class="anim" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.3s" dur="0.4s" fill="freeze"
             calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="60" y="200" width="330" height="76" rx="8" fill="#FDF6EC" stroke="#B45309" stroke-width="2"/>
    <rect x="60" y="200" width="3" height="76" rx="1" fill="#B45309"/>
    <text x="80" y="219" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11"
          font-weight="700" letter-spacing="0.8" fill="#B45309">MODEL VENDOR</text>
    <text x="80" y="244" font-family="Merriweather, Georgia, serif" font-size="17"
          font-weight="700" fill="#92400E">OpenAI</text>
    <text x="80" y="264" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11"
          fill="#78716C">Profitna korporacija · Delaware · IPO 2026.</text>
  </g>

  <!-- Anthropic: NEUTRAL -->
  <g class="anim" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.4s" fill="freeze"
             calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="510" y="200" width="330" height="76" rx="8" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1.5"/>
    <rect x="510" y="200" width="3" height="76" rx="1" fill="#78716C"/>
    <text x="530" y="219" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11"
          font-weight="700" letter-spacing="0.8" fill="#78716C">MODEL VENDOR</text>
    <text x="530" y="244" font-family="Merriweather, Georgia, serif" font-size="17"
          font-weight="700" fill="#1C1917">Anthropic</text>
    <text x="530" y="264" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11"
          fill="#78716C">Public Benefit Corp (PBC) · Delaware</text>
  </g>

  <!-- Arrows: Vendor → Cloud + equity chips -->
  <g class="anim" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.7s" dur="0.3s" fill="freeze"
             calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <line x1="225" y1="276" x2="225" y2="307" stroke="#B45309" stroke-width="2"
          stroke-linecap="round" marker-end="url(#vd-arr-coffee)"/>
    <text x="233" y="294" font-family="Inter, system-ui, -apple-system, sans-serif"
          font-size="10" fill="#B45309">hostuje na</text>
  </g>

  <g class="anim" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.3s" fill="freeze"
             calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <line x1="675" y1="276" x2="675" y2="307" stroke="#78716C" stroke-width="1.5"
          stroke-linecap="round" marker-end="url(#vd-arr-stone)"/>
    <text x="683" y="294" font-family="Inter, system-ui, -apple-system, sans-serif"
          font-size="10" fill="#78716C">hostuje na</text>
  </g>

  <!-- Equity chips — beside vendor→cloud arrows -->
  <!-- Left: ~27% Microsoft (coffee) -->
  <g class="anim" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.95s" dur="0.35s" fill="freeze"
             calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="246" y="281" width="118" height="22" rx="11" fill="#FDF6EC" stroke="#B45309" stroke-width="1"/>
    <text x="305" y="296" text-anchor="middle"
          font-family="Inter, system-ui, -apple-system, sans-serif" font-size="10"
          font-weight="600" fill="#92400E">~27% · Microsoft</text>
  </g>

  <!-- Right: ~8B$ Amazon (neutral) -->
  <g class="anim" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.05s" dur="0.35s" fill="freeze"
             calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="696" y="281" width="114" height="22" rx="11" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1"/>
    <text x="753" y="296" text-anchor="middle"
          font-family="Inter, system-ui, -apple-system, sans-serif" font-size="10"
          font-weight="600" fill="#78716C">~8B$ · Amazon</text>
  </g>

  <!-- ====== ROW 3: CLOUD HYPERSCALER ====== -->
  <!-- Microsoft Azure -->
  <g class="anim" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.4s" fill="freeze"
             calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="60" y="313" width="330" height="74" rx="8" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1.5"/>
    <rect x="60" y="313" width="3" height="74" rx="1" fill="#78716C"/>
    <text x="80" y="332" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11"
          font-weight="700" letter-spacing="0.8" fill="#78716C">CLOUD HYPERSCALER</text>
    <text x="80" y="357" font-family="Merriweather, Georgia, serif" font-size="15"
          font-weight="700" fill="#1C1917">Microsoft Azure</text>
    <text x="80" y="375" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11"
          fill="#78716C">Primarni cloud za OpenAI infrastrukturu</text>
  </g>

  <!-- Amazon AWS -->
  <g class="anim" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.3s" dur="0.4s" fill="freeze"
             calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="510" y="313" width="330" height="74" rx="8" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1.5"/>
    <rect x="510" y="313" width="3" height="74" rx="1" fill="#78716C"/>
    <text x="530" y="332" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11"
          font-weight="700" letter-spacing="0.8" fill="#78716C">CLOUD HYPERSCALER</text>
    <text x="530" y="357" font-family="Merriweather, Georgia, serif" font-size="15"
          font-weight="700" fill="#1C1917">Amazon AWS</text>
    <text x="530" y="375" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11"
          fill="#78716C">Primarni cloud za Anthropic infrastrukturu</text>
  </g>

  <!-- ====== EXPLANATION PANEL ====== -->
  <g class="anim" opacity="0">
    <animateTransform attributeName="transform" type="translate"
                      from="0 8" to="0 0" begin="2.55s" dur="0.5s" fill="freeze"
                      calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" additive="sum"/>
    <animate attributeName="opacity" from="0" to="1" begin="2.55s" dur="0.5s" fill="freeze"
             calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="60" y="406" width="780" height="128" rx="8" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1.5"/>
    <rect x="72" y="419" width="3" height="14" rx="1" fill="#B45309"/>
    <text x="82" y="431" font-family="Merriweather, Georgia, serif" font-size="13"
          font-weight="700" fill="#1C1917">Šta ovo znači za enterprise kupce</text>
    <text x="72" y="456" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12"
          fill="#44403C">Kupovina OpenAI ili Anthropic API-ja nije vendor-neutralan izbor — to je ulazak</text>
    <text x="72" y="474" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12"
          fill="#44403C">u komercijalni trokut: model vendor + cloud hyperscaler + vaš tech stack.</text>
    <text x="72" y="498" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11"
          font-style="italic" fill="#78716C">OpenAI (Delaware korporacija) nema statutarnu zaštitu misije — Anthropic (PBC) je zadržava.</text>
    <text x="72" y="516" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11"
          font-style="italic" fill="#78716C">Za dugoročne strateške odluke o zavisnosti, ova razlika je relevantna.</text>
  </g>

  <!-- Replay button -->
  <g class="replay-btn" style="cursor:pointer; opacity:0; transition: opacity 0.2s ease;"
     role="button" tabindex="0" aria-label="Pusti animaciju ponovo">
    <circle cx="855" cy="40" r="16" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1"/>
    <path d="M 855 31 A 9 9 0 1 1 846 40" fill="none" stroke="#78716C" stroke-width="1.5"
          stroke-linecap="round"/>
    <polygon points="852,28 858,28 855,33" fill="#78716C"/>
    <title>Pusti ponovo</title>
  </g>

  <script>
  // <![CDATA[
  (function () {
    var svg = document.getElementById('vendor-dep-svg');
    var btn = svg && svg.querySelector('.replay-btn');
    if (!svg || !btn) return;
    function replay() { if (typeof svg.setCurrentTime === 'function') svg.setCurrentTime(0); }
    btn.addEventListener('click', replay);
    btn.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); replay(); }
    });
  })();
  // ]]>
  </script>

</svg>
