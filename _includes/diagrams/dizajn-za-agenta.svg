<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Inter, system-ui, -apple-system, sans-serif" id="cp-svg" role="img" aria-label="Hub-and-spoke dijagram: klijentske površine WEB, MOBILNI, DESKTOP, ADMIN i izolovana usluga SANDBOX povezani su na jedan centralni control plane (izvor istine). Samo control plane komunicira s bazom; direktan pristup klijenta bazi je precrtan kao zabranjen.">
  <title>Jedan control plane: sve površine idu kroz centralni hub (izvor istine), a samo hub dodiruje bazu — klijent nikad direktno.</title>

  <defs>
    <marker id="cp-arrow-coffee" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <polygon points="0,0 10,5 0,10" fill="#B45309"/>
    </marker>
    <marker id="cp-arrow-stone" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0,0 10,5 0,10" fill="#78716C"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#FAF9F6"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" font-family="Merriweather, Georgia, serif" font-size="20" font-weight="700" fill="#1C1917">Sve ide kroz jedan control plane</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#78716C">Jedan izvor istine koji agent može pročitati u cjelini — klijent nikad ne dodiruje bazu</text>

  <!-- ============================================================ -->
  <!-- FORBIDDEN ARC: the tempting client→baza shortcut, crossed    -->
  <!-- out. Neutral (stone/ink) so it never competes with coffee.   -->
  <!-- Revealed late, after the legit path, as a "and NOT this".    -->
  <!-- ============================================================ -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="2.7s" dur="0.5s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <path d="M 245 116 C 350 78 650 78 760 172" fill="none" stroke="#78716C" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.6"/>
    <!-- crossed-out mark at the apex -->
    <line x1="492" y1="72" x2="508" y2="88" stroke="#57534E" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="508" y1="72" x2="492" y2="88" stroke="#57534E" stroke-width="2.5" stroke-linecap="round"/>
    <text x="500" y="104" text-anchor="middle" font-size="11" font-style="italic" fill="#57534E">direktan pristup bazi = zabranjeno</text>
  </g>

  <!-- ============================================================ -->
  <!-- LEFT COLUMN: client surfaces. Neutral grayscale boxes.       -->
  <!-- x=70..245, height 52, spacing 64. Eyebrow above the column.  -->
  <!-- ============================================================ -->
  <text x="70" y="88" font-size="11" font-weight="700" fill="#78716C" letter-spacing="0.8">KLIJENTSKE POVRŠINE</text>

  <!-- WEB -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="0.3s" dur="0.35s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="70" y="100" width="175" height="52" rx="8" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1.5"/>
    <rect x="70" y="100" width="3" height="52" fill="#78716C"/>
    <text x="157" y="122" text-anchor="middle" font-size="14" font-weight="700" fill="#1C1917">WEB</text>
    <text x="157" y="139" text-anchor="middle" font-size="10" font-style="italic" fill="#78716C">web aplikacija</text>
  </g>

  <!-- MOBILNI -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="0.45s" dur="0.35s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="70" y="164" width="175" height="52" rx="8" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1.5"/>
    <rect x="70" y="164" width="3" height="52" fill="#78716C"/>
    <text x="157" y="186" text-anchor="middle" font-size="14" font-weight="700" fill="#1C1917">MOBILNI</text>
    <text x="157" y="203" text-anchor="middle" font-size="10" font-style="italic" fill="#78716C">iOS · Android</text>
  </g>

  <!-- DESKTOP -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="0.6s" dur="0.35s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="70" y="228" width="175" height="52" rx="8" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1.5"/>
    <rect x="70" y="228" width="3" height="52" fill="#78716C"/>
    <text x="157" y="250" text-anchor="middle" font-size="14" font-weight="700" fill="#1C1917">DESKTOP</text>
    <text x="157" y="267" text-anchor="middle" font-size="10" font-style="italic" fill="#78716C">desktop aplikacija</text>
  </g>

  <!-- ADMIN -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="0.75s" dur="0.35s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="70" y="292" width="175" height="52" rx="8" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1.5"/>
    <rect x="70" y="292" width="3" height="52" fill="#78716C"/>
    <text x="157" y="314" text-anchor="middle" font-size="14" font-weight="700" fill="#1C1917">ADMIN</text>
    <text x="157" y="331" text-anchor="middle" font-size="10" font-style="italic" fill="#78716C">interni admin</text>
  </g>

  <!-- SANDBOX (isolated service) — dashed border signals isolation -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="0.9s" dur="0.35s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="70" y="372" width="175" height="52" rx="8" fill="#F5F5F0" stroke="#A8A29E" stroke-width="1.5" stroke-dasharray="5,4"/>
    <rect x="70" y="372" width="3" height="52" fill="#78716C"/>
    <text x="157" y="394" text-anchor="middle" font-size="14" font-weight="700" fill="#1C1917">SANDBOX</text>
    <text x="157" y="411" text-anchor="middle" font-size="10" font-style="italic" fill="#78716C">izolovane usluge</text>
  </g>

  <!-- ============================================================ -->
  <!-- SPOKES: each surface → hub (converge). Stone 1.5px, arrows    -->
  <!-- point into the hub. Sandbox spoke dashed (isolated).          -->
  <!-- Start x=253 (gap from box), end x=372 (gap from hub).         -->
  <!-- ============================================================ -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="1.15s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <line x1="253" y1="126" x2="372" y2="185" stroke="#78716C" stroke-width="1.5" marker-end="url(#cp-arrow-stone)"/>
    <line x1="253" y1="190" x2="372" y2="210" stroke="#78716C" stroke-width="1.5" marker-end="url(#cp-arrow-stone)"/>
    <line x1="253" y1="254" x2="372" y2="235" stroke="#78716C" stroke-width="1.5" marker-end="url(#cp-arrow-stone)"/>
    <line x1="253" y1="318" x2="372" y2="260" stroke="#78716C" stroke-width="1.5" marker-end="url(#cp-arrow-stone)"/>
    <line x1="253" y1="398" x2="372" y2="288" stroke="#78716C" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#cp-arrow-stone)"/>
  </g>

  <!-- ============================================================ -->
  <!-- HUB (focal, coffee): the control plane. x=380..580, y=150..320 -->
  <!-- ============================================================ -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="1.6s" dur="0.45s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="380" y="150" width="200" height="170" rx="8" fill="#FDF6EC" stroke="#B45309" stroke-width="2"/>
    <rect x="380" y="150" width="3" height="170" fill="#B45309"/>
    <text x="400" y="182" font-size="11" font-weight="700" fill="#B45309" letter-spacing="0.8">CONTROL PLANE</text>
    <text x="400" y="214" font-family="Merriweather, Georgia, serif" font-size="20" font-weight="700" fill="#1C1917">izvor istine</text>
    <text x="400" y="235" font-size="12" font-style="italic" fill="#78716C">(upravljački sloj)</text>
    <text x="400" y="266" font-size="12" font-weight="600" fill="#44403C">jedna tačka pristupa:</text>
    <text x="400" y="285" font-size="12" fill="#57534E">auth · validacija</text>
    <text x="400" y="303" font-size="12" fill="#57534E">observability</text>
  </g>

  <!-- ============================================================ -->
  <!-- PRIMARY PATH (coffee): hub → baza. The only route to data.    -->
  <!-- ============================================================ -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="2.0s" dur="0.35s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <line x1="588" y1="235" x2="672" y2="235" stroke="#B45309" stroke-width="2" marker-end="url(#cp-arrow-coffee)"/>
    <text x="630" y="224" text-anchor="middle" font-size="10" font-style="italic" font-weight="600" fill="#92400E">jedini put</text>
  </g>

  <!-- ============================================================ -->
  <!-- BAZA (neutral box, coffee DB-cylinder flourish). Behind hub.  -->
  <!-- x=680..840, y=175..295                                        -->
  <!-- ============================================================ -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="2.2s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="680" y="175" width="160" height="120" rx="8" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1.5"/>
    <rect x="680" y="175" width="3" height="120" fill="#78716C"/>
    <text x="700" y="203" font-size="11" font-weight="700" fill="#78716C" letter-spacing="0.8">PODACI</text>
    <text x="700" y="235" font-family="Merriweather, Georgia, serif" font-size="20" font-weight="700" fill="#1C1917">baza</text>
    <text x="700" y="258" font-size="12" fill="#57534E">podaci · funkcije</text>
    <text x="700" y="276" font-size="12" fill="#57534E">logika na jednom mjestu</text>

    <!-- Database cylinder icon (coffee flourish), top-right corner -->
    <g transform="translate(812, 199)">
      <ellipse cx="0" cy="0" rx="14" ry="4" fill="#FDF6EC" stroke="#B45309" stroke-width="1.3"/>
      <path d="M -14 0 L -14 22 A 14 4 0 0 0 14 22 L 14 0" fill="#FDF6EC" stroke="#B45309" stroke-width="1.3"/>
      <ellipse cx="0" cy="8" rx="14" ry="4" fill="none" stroke="#B45309" stroke-width="0.8" opacity="0.5"/>
      <ellipse cx="0" cy="16" rx="14" ry="4" fill="none" stroke="#B45309" stroke-width="0.8" opacity="0.5"/>
    </g>
  </g>

  <!-- ============================================================ -->
  <!-- CAPTION (coffee callout): the rule. x=60, y=460, 780×72       -->
  <!-- ============================================================ -->
  <g opacity="0" transform="translate(0, 8)">
    <animate attributeName="opacity" values="0;1" begin="3.2s" dur="0.5s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <animateTransform attributeName="transform" type="translate" begin="3.2s" dur="0.5s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" values="0 8;0 0"/>
    <rect x="60" y="460" width="780" height="72" rx="8" fill="#FDF6EC" stroke="#B45309" stroke-width="1"/>
    <rect x="60" y="460" width="3" height="72" fill="#B45309"/>
    <text x="80" y="484" font-size="11" font-weight="700" fill="#B45309" letter-spacing="0.8">PRAVILO</text>
    <text x="80" y="506" font-family="Merriweather, Georgia, serif" font-size="15" font-style="italic" fill="#1C1917">Klijent → server → baza → server → klijent. Nikad prečicom u bazu.</text>
    <text x="80" y="524" font-size="12" fill="#57534E">Jedan control plane, jedan izvor istine — jedna površina koju agent može pročitati i mijenjati u cjelini.</text>
  </g>

  <!-- Footnote -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="3.9s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <text x="60" y="562" font-size="11" font-style="italic" fill="#78716C">Hub i klijenti u istom monorepou; sandbox je izolovan da ograniči domet štete. Auth, validacija i observability žive na jednom mjestu.</text>
  </g>

  <!-- Replay button -->
  <g class="replay-btn" style="cursor:pointer; opacity:0; transition: opacity 0.2s ease;" role="button" tabindex="0" aria-label="Pusti animaciju ponovo">
    <circle cx="855" cy="40" r="16" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1"/>
    <path d="M 855 31 A 9 9 0 1 1 846 40" fill="none" stroke="#78716C" stroke-width="1.5" stroke-linecap="round"/>
    <polygon points="852,28 858,28 855,33" fill="#78716C"/>
    <title>Pusti ponovo</title>
  </g>

  <style>
    #cp-svg:hover .replay-btn { opacity: 1; }
    #cp-svg .replay-btn:hover circle { fill: #FDF6EC; stroke: #B45309; }
    #cp-svg .replay-btn:hover path { stroke: #B45309; }
    #cp-svg .replay-btn:hover polygon { fill: #B45309; }
    #cp-svg .replay-btn:focus { outline: none; opacity: 1; }
    #cp-svg .replay-btn:focus circle { stroke: #B45309; stroke-width: 2; }
    @media (prefers-reduced-motion: reduce) {
      #cp-svg animate, #cp-svg animateTransform { display: none; }
      #cp-svg .replay-btn { display: none; }
    }
  </style>

  <script>
    // <![CDATA[
    (function () {
      const svg = document.getElementById('cp-svg');
      const btn = svg && svg.querySelector('.replay-btn');
      if (!svg || !btn) return;
      function replay() { if (typeof svg.setCurrentTime === 'function') svg.setCurrentTime(0); }
      btn.addEventListener('click', replay);
      btn.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); replay(); } });
    })();
    // ]]>
  </script>
</svg>
