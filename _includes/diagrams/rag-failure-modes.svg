<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 830" font-family="Inter, system-ui, -apple-system, sans-serif" id="rfm-svg" role="img" aria-label="Dijagram: sedam tačaka kvara u RAG pipeline-u i dijagnostički redoslijed provjere">
  <title>Sedam tačaka kvara u RAG pipeline-u</title>
  <defs>
    <marker id="rfm-arrow-coffee" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <polygon points="0,0 10,5 0,10" fill="#B45309"/>
    </marker>
    <marker id="rfm-arrow-stone" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0,0 10,5 0,10" fill="#78716C"/>
    </marker>
  </defs>

  <rect width="900" height="830" fill="#FAF9F6"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="Merriweather, Georgia, serif" font-size="20" font-weight="700" fill="#1C1917">Sedam tačaka kvara u RAG pipeline-u</text>
  <text x="450" y="66" text-anchor="middle" font-size="13" fill="#78716C">Dijagnostička mapa: gdje provjeriti kad RAG da pogrešan odgovor</text>

  <!-- ROW 1: input -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.4s" fill="freeze"/>
    <rect x="60" y="100" width="780" height="64" rx="8" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1"/>
    <rect x="60" y="100" width="3" height="64" fill="#78716C"/>
    <text x="80" y="124" font-size="11" font-weight="700" fill="#78716C" letter-spacing="0.8">PITANJE KORISNIKA</text>
    <text x="80" y="148" font-size="15" fill="#1C1917" font-style="italic" font-family="Merriweather, Georgia, serif">„Koja je trenutna cijena pretplate?“</text>
  </g>

  <!-- Arrow: input -> stage row -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.7s" dur="0.3s" fill="freeze"/>
    <line x1="450" y1="170" x2="450" y2="216" stroke="#78716C" stroke-width="1.5" marker-end="url(#rfm-arrow-stone)"/>
  </g>

  <!-- STAGE 1: Korpus + indeks -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.9s" dur="0.4s" fill="freeze"/>
    <rect x="60" y="230" width="200" height="120" rx="8" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1.5"/>
    <text x="78" y="254" font-size="11" font-weight="700" fill="#78716C" letter-spacing="0.8">KORPUS + INDEKS</text>
    <text x="78" y="280" font-size="14" font-weight="600" fill="#1C1917">Dokumenti i indeks</text>
    <text x="78" y="302" font-size="12" fill="#57534E">Izvorni dokumenti podijeljeni</text>
    <text x="78" y="318" font-size="12" fill="#57534E">u chunkove i indexirani.</text>
    <rect x="78" y="326" width="30" height="18" rx="9" fill="#E7E5E4" stroke="#D6D3D1" stroke-width="1"/>
    <text x="93" y="339" font-size="10" font-weight="700" fill="#78716C" text-anchor="middle">K1</text>
    <rect x="114" y="326" width="30" height="18" rx="9" fill="#E7E5E4" stroke="#D6D3D1" stroke-width="1"/>
    <text x="129" y="339" font-size="10" font-weight="700" fill="#78716C" text-anchor="middle">K4</text>
  </g>

  <!-- Connector: stage1 -> stage2 -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.15s" dur="0.3s" fill="freeze"/>
    <line x1="268" y1="285" x2="312" y2="285" stroke="#78716C" stroke-width="1.5" marker-end="url(#rfm-arrow-stone)"/>
  </g>

  <!-- STAGE 2: Dohvatanje (centerpiece, wider) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.4s" fill="freeze"/>
    <rect x="320" y="230" width="260" height="120" rx="8" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1.5"/>
    <text x="338" y="254" font-size="11" font-weight="700" fill="#78716C" letter-spacing="0.8">DOHVATANJE</text>
    <text x="338" y="280" font-size="14" font-weight="600" fill="#1C1917">Pretraga po sličnosti</text>
    <text x="338" y="302" font-size="12" fill="#57534E">Bira top-k najsličnijih chunkova</text>
    <text x="338" y="318" font-size="12" fill="#57534E">iz indexa za dati query.</text>
    <rect x="338" y="326" width="30" height="18" rx="9" fill="#E7E5E4" stroke="#D6D3D1" stroke-width="1"/>
    <text x="353" y="339" font-size="10" font-weight="700" fill="#78716C" text-anchor="middle">K2</text>
    <rect x="374" y="326" width="30" height="18" rx="9" fill="#E7E5E4" stroke="#D6D3D1" stroke-width="1"/>
    <text x="389" y="339" font-size="10" font-weight="700" fill="#78716C" text-anchor="middle">K5</text>

    <!-- magnifying-glass icon, top-right of box -->
    <g transform="translate(538, 248)">
      <circle cx="-3" cy="-3" r="9" fill="#FDF6EC" stroke="#B45309" stroke-width="1.3"/>
      <line x1="4" y1="4" x2="12" y2="12" stroke="#B45309" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Connector: stage2 -> stage3 -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.65s" dur="0.3s" fill="freeze"/>
    <line x1="588" y1="285" x2="632" y2="285" stroke="#78716C" stroke-width="1.5" marker-end="url(#rfm-arrow-stone)"/>
  </g>

  <!-- STAGE 3: Sklapanje konteksta -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.9s" dur="0.4s" fill="freeze"/>
    <rect x="640" y="230" width="200" height="120" rx="8" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1.5"/>
    <text x="658" y="250" font-size="11" font-weight="700" fill="#78716C" letter-spacing="0.8">SKLAPANJE</text>
    <text x="658" y="262" font-size="11" font-weight="700" fill="#78716C" letter-spacing="0.8">KONTEKSTA</text>
    <text x="658" y="284" font-size="14" font-weight="600" fill="#1C1917">Pronađeni odlomci</text>
    <text x="658" y="304" font-size="12" fill="#57534E">Spremni za slanje modelu.</text>
    <rect x="658" y="316" width="30" height="18" rx="9" fill="#E7E5E4" stroke="#D6D3D1" stroke-width="1"/>
    <text x="673" y="329" font-size="10" font-weight="700" fill="#78716C" text-anchor="middle">K3</text>
  </g>

  <!-- Convergence: query rail (dashed stone) + context rail (solid coffee) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.4s" fill="freeze"/>
    <path d="M 160 164 L 160 390 L 450 390" fill="none" stroke="#78716C" stroke-width="1.3" stroke-dasharray="4,3"/>
    <path d="M 740 350 L 740 390 L 450 390" fill="none" stroke="#B45309" stroke-width="2"/>
    <circle cx="450" cy="390" r="4" fill="#B45309"/>
    <line x1="450" y1="394" x2="450" y2="426" stroke="#B45309" stroke-width="2" marker-end="url(#rfm-arrow-coffee)"/>
    <text x="305" y="382" font-size="10" fill="#78716C" font-style="italic" text-anchor="middle">izvorni query</text>
    <text x="595" y="382" font-size="10" fill="#92400E" font-style="italic" font-weight="600" text-anchor="middle">+ sklopljeni kontekst</text>
  </g>

  <!-- FOCAL: Generisanje (LLM) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.5s" dur="0.4s" fill="freeze"/>
    <rect x="320" y="430" width="260" height="60" rx="8" fill="#FDF6EC" stroke="#B45309" stroke-width="1.5"/>
    <rect x="320" y="430" width="3" height="60" fill="#B45309"/>
    <text x="338" y="454" font-size="11" font-weight="700" fill="#B45309" letter-spacing="0.8">GENERISANJE</text>
    <text x="338" y="476" font-size="14" font-weight="600" fill="#1C1917">Model sastavlja odgovor</text>
    <rect x="520" y="444" width="34" height="20" rx="10" fill="#F5E6D0" stroke="#92400E" stroke-width="1"/>
    <text x="537" y="458" font-size="10" font-weight="700" fill="#92400E" text-anchor="middle">K6</text>
  </g>

  <!-- Arrow: focal -> output -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.9s" dur="0.3s" fill="freeze"/>
    <line x1="450" y1="496" x2="450" y2="534" stroke="#B45309" stroke-width="2" marker-end="url(#rfm-arrow-coffee)"/>
  </g>

  <!-- OUTPUT -->
  <g opacity="0" transform="translate(0, 8)">
    <animate attributeName="opacity" from="0" to="1" begin="3.1s" dur="0.5s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="0 8" to="0 0" begin="3.1s" dur="0.5s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" values="0 8;0 0"/>
    <rect x="60" y="540" width="780" height="90" rx="8" fill="#FDF6EC" stroke="#B45309" stroke-width="1"/>
    <rect x="60" y="540" width="3" height="90" fill="#B45309"/>
    <text x="80" y="564" font-size="11" font-weight="700" fill="#B45309" letter-spacing="0.8">ODGOVOR</text>
    <text x="80" y="588" font-size="14" fill="#1C1917" font-style="italic" font-family="Merriweather, Georgia, serif">Tačan odgovor — ili jedna od sedam grešaka gore.</text>
    <text x="80" y="608" font-size="11" fill="#78716C" font-style="italic">K7 — provjerite da evaluacija razdvaja dohvatanje od generisanja.</text>
  </g>

  <!-- LEGEND -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.6s" dur="0.4s" fill="freeze"/>
    <rect x="60" y="662" width="3" height="14" fill="#B45309"/>
    <text x="76" y="674" font-family="Merriweather, Georgia, serif" font-size="13" font-weight="700" fill="#1C1917">Sedam koraka dijagnoze</text>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.7s" dur="0.35s" fill="freeze"/>
    <circle cx="69" cy="702" r="9" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1"/>
    <text x="69" y="705" font-size="10" font-weight="700" fill="#78716C" text-anchor="middle">K1</text>
    <text x="84" y="706" font-size="12" fill="#44403C">Da li odgovor postoji u korpusu?</text>

    <circle cx="489" cy="702" r="9" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1"/>
    <text x="489" y="705" font-size="10" font-weight="700" fill="#78716C" text-anchor="middle">K5</text>
    <text x="504" y="706" font-size="12" fill="#44403C">Da li je dohvaćeni sadržaj zastario?</text>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.8s" dur="0.35s" fill="freeze"/>
    <circle cx="69" cy="726" r="9" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1"/>
    <text x="69" y="729" font-size="10" font-weight="700" fill="#78716C" text-anchor="middle">K2</text>
    <text x="84" y="730" font-size="12" fill="#44403C">Da li je dohvatanje promašilo chunk?</text>

    <circle cx="489" cy="726" r="9" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1"/>
    <text x="489" y="729" font-size="10" font-weight="700" fill="#78716C" text-anchor="middle">K6</text>
    <text x="504" y="730" font-size="12" fill="#44403C">Da li je model omašio uprkos dobrom dohvatanju?</text>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.9s" dur="0.35s" fill="freeze"/>
    <circle cx="69" cy="750" r="9" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1"/>
    <text x="69" y="753" font-size="10" font-weight="700" fill="#78716C" text-anchor="middle">K3</text>
    <text x="84" y="754" font-size="12" fill="#44403C">Da li je chunk zakopan u sredini konteksta?</text>

    <circle cx="489" cy="750" r="9" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1"/>
    <text x="489" y="753" font-size="10" font-weight="700" fill="#78716C" text-anchor="middle">K7</text>
    <text x="504" y="754" font-size="12" fill="#44403C">Da li evaluacija razdvaja dohvatanje od generisanja?</text>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="4.0s" dur="0.35s" fill="freeze"/>
    <circle cx="69" cy="774" r="9" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1"/>
    <text x="69" y="777" font-size="10" font-weight="700" fill="#78716C" text-anchor="middle">K4</text>
    <text x="84" y="778" font-size="12" fill="#44403C">Da li je chunking uništio sadržaj?</text>
  </g>

  <!-- Footnote -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="4.15s" dur="0.3s" fill="freeze"/>
    <text x="450" y="805" font-size="11" fill="#78716C" font-style="italic" text-anchor="middle">Zasnovano na: Barnett i dr. (2024), Liu i dr. (2023).</text>
  </g>

  <!-- Replay button -->
  <g class="replay-btn" style="cursor:pointer; opacity:0; transition: opacity 0.2s ease;" role="button" tabindex="0" aria-label="Pusti animaciju ponovo">
    <circle cx="855" cy="40" r="16" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1"/>
    <path d="M 855 31 A 9 9 0 1 1 846 40" fill="none" stroke="#78716C" stroke-width="1.5" stroke-linecap="round"/>
    <polygon points="852,28 858,28 855,33" fill="#78716C"/>
    <title>Pusti ponovo</title>
  </g>

  <style>
    #rfm-svg:hover .replay-btn { opacity: 1; }
    #rfm-svg .replay-btn:hover circle { fill: #FDF6EC; stroke: #B45309; }
    #rfm-svg .replay-btn:hover path { stroke: #B45309; }
    #rfm-svg .replay-btn:hover polygon { fill: #B45309; }
    #rfm-svg .replay-btn:focus { outline: none; opacity: 1; }
    #rfm-svg .replay-btn:focus circle { stroke: #B45309; stroke-width: 2; }
    @media (prefers-reduced-motion: reduce) {
      #rfm-svg animate, #rfm-svg animateTransform { display: none; }
      #rfm-svg .replay-btn { display: none; }
    }
  </style>

  <script>
    // <![CDATA[
    (function () {
      const svg = document.getElementById('rfm-svg');
      const btn = svg && svg.querySelector('.replay-btn');
      if (!svg || !btn) return;
      function replay() { if (typeof svg.setCurrentTime === 'function') svg.setCurrentTime(0); }
      btn.addEventListener('click', replay);
      btn.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); replay(); } });
    })();
    // ]]>
  </script>
</svg>
