<svg id="eu-ai-act-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" role="img">
  <title>Četiri nivoa rizika po EU AI Act: piramida s nivoima od zabranjenih sistema do minimalnog rizika</title>

  <style>
    @media (prefers-reduced-motion: reduce) {
      #eu-ai-act-svg animate,
      #eu-ai-act-svg animateTransform { display: none; }
      #eu-ai-act-svg .replay-btn { display: none; }
      #eu-ai-act-svg .anim-group { opacity: 1; }
    }
    #eu-ai-act-svg:hover .replay-btn { opacity: 1; }
    #eu-ai-act-svg .replay-btn { cursor: pointer; opacity: 0; transition: opacity 0.2s ease; }
    #eu-ai-act-svg .replay-btn:hover circle { fill: #FDF6EC; stroke: #B45309; }
    #eu-ai-act-svg .replay-btn:hover path { stroke: #B45309; }
    #eu-ai-act-svg .replay-btn:hover polygon { fill: #B45309; }
    #eu-ai-act-svg .replay-btn:focus { outline: none; opacity: 1; }
    #eu-ai-act-svg .replay-btn:focus circle { stroke: #B45309; stroke-width: 2; }
  </style>

  <!-- Background -->
  <rect width="900" height="580" fill="#FAF9F6"/>

  <!-- Title + subtitle -->
  <g class="anim-group" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" values="0;1"/>
    <text x="450" y="46" font-family="Merriweather, Georgia, serif" font-size="20" font-weight="700" fill="#1C1917" text-anchor="middle">Četiri nivoa rizika — EU AI Act</text>
    <text x="450" y="68" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="13" fill="#78716C" text-anchor="middle">Sistem klasifikacije po Uredbi EU 2024/1689</text>
  </g>

  <!-- TIER 1: ZABRANJENI AI SISTEMI (narrowest, dark) -->
  <g class="anim-group" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" values="0;1"/>
    <!-- box -->
    <rect x="240" y="88" width="420" height="80" rx="8" fill="#44403C"/>
    <!-- left stripe -->
    <rect x="240" y="88" width="3" height="80" rx="2" fill="#78716C"/>
    <!-- eyebrow -->
    <text x="252" y="108" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#D6D3D1" letter-spacing="0.8">ZABRANJENI AI SISTEMI</text>
    <!-- heading -->
    <text x="252" y="127" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#FAF9F6">Neprihvatljivi rizik — Čl. 5</text>
    <!-- example -->
    <text x="252" y="148" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="10.5" fill="#A8A29E">Social scoring · biometrija u realnom vremenu · subliminalna manipulacija</text>
    <!-- pill: ZABRANJENO -->
    <rect x="554" y="117" width="90" height="22" rx="11" fill="#78716C"/>
    <text x="599" y="132" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#FAF9F6" text-anchor="middle" letter-spacing="0.3">ZABRANJENO</text>
  </g>

  <!-- TIER 2: HIGH-RISK AI SISTEMI (focal, coffee, tallest) -->
  <g class="anim-group" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.0s" dur="0.5s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" values="0;1"/>
    <animateTransform attributeName="transform" type="translate" from="0 6" to="0 0" begin="1.0s" dur="0.5s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <!-- box -->
    <rect x="150" y="176" width="600" height="148" rx="8" fill="#FDF6EC" stroke="#B45309" stroke-width="2"/>
    <!-- left stripe -->
    <rect x="150" y="176" width="3" height="148" fill="#B45309"/>
    <!-- eyebrow -->
    <text x="162" y="196" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#92400E" letter-spacing="0.8">HIGH-RISK AI SISTEMI</text>
    <!-- heading -->
    <text x="162" y="216" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#92400E">Ključna kategorija za firme</text>
    <!-- internal divider -->
    <line x1="162" y1="229" x2="720" y2="229" stroke="#F5E6D0" stroke-width="1"/>
    <!-- Annex III sub-section -->
    <text x="162" y="246" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#B45309">Aneks III — rok: 2. august 2026.</text>
    <text x="162" y="262" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#44403C">HR alati · kreditno ocjenjivanje · kritična infrastruktura · organi reda</text>
    <!-- Annex II sub-section -->
    <line x1="162" y1="275" x2="720" y2="275" stroke="#F5E6D0" stroke-width="1"/>
    <text x="162" y="291" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#78716C">Aneks II — rok: 2. august 2027.</text>
    <text x="162" y="307" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#78716C">Medicinski uređaji · vozila · industrijska oprema</text>
    <!-- pill: VISOKE OBAVEZE -->
    <rect x="604" y="243" width="130" height="22" rx="11" fill="#FDF6EC" stroke="#B45309" stroke-width="1.5"/>
    <text x="669" y="258" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#92400E" text-anchor="middle" letter-spacing="0.3">VISOKE OBAVEZE</text>
  </g>

  <!-- TIER 3: OGRANIČENI RIZIK -->
  <g class="anim-group" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" values="0;1"/>
    <!-- box -->
    <rect x="80" y="332" width="740" height="90" rx="8" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1.5"/>
    <!-- left stripe -->
    <rect x="80" y="332" width="3" height="90" fill="#A8A29E"/>
    <!-- eyebrow -->
    <text x="92" y="352" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#78716C" letter-spacing="0.8">OGRANIČENI RIZIK</text>
    <!-- heading -->
    <text x="92" y="371" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1C1917">Obaveza transparentnosti</text>
    <!-- example -->
    <text x="92" y="389" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#78716C">Chatbotovi · deepfake sadržaj · prepoznavanje emocija</text>
    <!-- note -->
    <text x="92" y="407" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="10.5" fill="#A8A29E">Korisnik mora biti obaviješten da razgovara s AI sistemom</text>
    <!-- pill: TRANSPARENTNOST -->
    <rect x="672" y="361" width="130" height="22" rx="11" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1.5"/>
    <text x="737" y="376" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#78716C" text-anchor="middle" letter-spacing="0.3">TRANSPARENTNOST</text>
  </g>

  <!-- TIER 4: MINIMALNI RIZIK (widest, barely visible) -->
  <g class="anim-group" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.1s" dur="0.5s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" values="0;1"/>
    <animateTransform attributeName="transform" type="translate" from="0 8" to="0 0" begin="2.1s" dur="0.5s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <!-- box -->
    <rect x="40" y="430" width="820" height="90" rx="8" fill="#FAF9F6" stroke="#D6D3D1" stroke-width="1"/>
    <!-- left stripe -->
    <rect x="40" y="430" width="3" height="90" fill="#D6D3D1"/>
    <!-- eyebrow -->
    <text x="52" y="450" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#A8A29E" letter-spacing="0.8">MINIMALNI RIZIK</text>
    <!-- heading -->
    <text x="52" y="469" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#78716C">Bez obaveznih zahtjeva</text>
    <!-- example -->
    <text x="52" y="487" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#A8A29E">Spam filteri · interni analitički alati · marketing personalizacija · preporučni sistemi</text>
    <!-- note -->
    <text x="52" y="505" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="10.5" fill="#D6D3D1">Najveći dio poslovnih AI alata spada u ovu kategoriju</text>
    <!-- pill: NEMA OBAVEZA -->
    <rect x="724" y="461" width="116" height="22" rx="11" fill="#FAF9F6" stroke="#D6D3D1" stroke-width="1"/>
    <text x="782" y="476" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#A8A29E" text-anchor="middle" letter-spacing="0.3">NEMA OBAVEZA</text>
  </g>

  <!-- Replay button -->
  <g class="replay-btn" role="button" tabindex="0" aria-label="Pusti animaciju ponovo">
    <circle cx="855" cy="40" r="16" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1"/>
    <path d="M 855 31 A 9 9 0 1 1 846 40" fill="none" stroke="#78716C" stroke-width="1.5" stroke-linecap="round"/>
    <polygon points="852,28 858,28 855,33" fill="#78716C"/>
    <title>Pusti ponovo</title>
  </g>

  <script>
    // <![CDATA[
    (function () {
      var svg = document.getElementById('eu-ai-act-svg');
      var btn = svg && svg.querySelector('.replay-btn');
      if (!svg || !btn) return;
      function replay() { if (typeof svg.setCurrentTime === 'function') svg.setCurrentTime(0); }
      btn.addEventListener('click', replay);
      btn.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); replay(); }
      });
    })();
    // ]]>
  </script>
</svg>
