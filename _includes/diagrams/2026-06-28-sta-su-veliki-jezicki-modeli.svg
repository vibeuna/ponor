<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 570" font-family="Inter, system-ui, -apple-system, sans-serif" id="llm-proc-svg" role="img" aria-label="Dijagram: kako LLM procesira tekst kroz tokenizaciju i kontekstni prozor">

  <title>Tokenizacija i kontekstni prozor — kako LLM procesira tekst</title>

  <defs>
    <marker id="arr-coffee-lp" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <polygon points="0,0 10,5 0,10" fill="#B45309"/>
    </marker>
    <marker id="arr-stone-lp" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0,0 10,5 0,10" fill="#78716C"/>
    </marker>
  </defs>

  <style>
    #llm-proc-svg:hover .replay-btn { opacity: 1; }
    #llm-proc-svg .replay-btn:hover circle { fill: #FDF6EC; stroke: #B45309; }
    #llm-proc-svg .replay-btn:hover path { stroke: #B45309; }
    #llm-proc-svg .replay-btn:hover polygon { fill: #B45309; }
    #llm-proc-svg .replay-btn:focus { outline: none; opacity: 1; }
    #llm-proc-svg .replay-btn:focus circle { stroke: #B45309; stroke-width: 2; }
    @media (prefers-reduced-motion: reduce) {
      #llm-proc-svg animate,
      #llm-proc-svg animateTransform { display: none; }
      #llm-proc-svg .replay-btn { display: none; }
    }
  </style>

  <!-- Background -->
  <rect width="900" height="570" fill="#FAF9F6"/>

  <!-- ===== TITLE ===== -->
  <text x="450" y="44" text-anchor="middle" font-family="Merriweather, Georgia, serif" font-size="20" font-weight="700" fill="#1C1917">Kako LLM procesira tekst</text>
  <text x="450" y="66" text-anchor="middle" font-size="13" fill="#78716C">Tokenizacija &#x2192; kontekstni prozor &#x2192; predikcija</text>

  <!-- ===== REPLAY BUTTON ===== -->
  <g class="replay-btn" style="cursor:pointer; opacity:0; transition: opacity 0.2s ease;" role="button" tabindex="0" aria-label="Pusti animaciju ponovo">
    <circle cx="855" cy="40" r="16" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1"/>
    <path d="M 855 31 A 9 9 0 1 1 846 40" fill="none" stroke="#78716C" stroke-width="1.5" stroke-linecap="round"/>
    <polygon points="852,28 858,28 855,33" fill="#78716C"/>
    <title>Pusti ponovo</title>
  </g>

  <!-- ===== STAGE 1: ULAZ ===== -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="60" y="88" width="780" height="58" rx="8" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1"/>
    <rect x="60" y="88" width="3" height="58" rx="2" fill="#78716C"/>
    <text x="80" y="107" font-size="11" font-weight="700" fill="#78716C" letter-spacing="0.8">ULAZ</text>
    <text x="80" y="130" font-family="Merriweather, Georgia, serif" font-size="14" font-style="italic" fill="#1C1917">&#x201E;Chatbot ne &#x010D;ita svaku rije&#x010D; zasebno.&#x201C;</text>
  </g>

  <!-- ===== ARROW 1: ulaz &#x2192; tokenizacija ===== -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.7s" dur="0.3s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <line x1="450" y1="150" x2="450" y2="162" stroke="#78716C" stroke-width="1.5" marker-end="url(#arr-stone-lp)"/>
  </g>

  <!-- ===== STAGE 2: TOKENIZACIJA — box frame + headers ===== -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.9s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="60" y="166" width="780" height="106" rx="8" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1"/>
    <rect x="60" y="166" width="3" height="106" rx="2" fill="#78716C"/>
    <text x="80" y="185" font-size="11" font-weight="700" fill="#78716C" letter-spacing="0.8">TOKENIZACIJA</text>
    <text x="80" y="203" font-size="12" fill="#78716C">Tekst se dijeli na tokene &#x2014; ne rije&#x010D;-po-rije&#x010D;, nego po statisti&#x010D;kim uzorcima</text>
  </g>

  <!-- Token 1: "Chat" -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.1s" dur="0.2s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="80" y="216" width="58" height="36" rx="6" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1.2"/>
    <text x="109" y="239" text-anchor="middle" font-size="13" font-weight="600" fill="#44403C">Chat</text>
  </g>
  <!-- Token 2: "bot" -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.2s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="146" y="216" width="50" height="36" rx="6" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1.2"/>
    <text x="171" y="239" text-anchor="middle" font-size="13" font-weight="600" fill="#44403C">bot</text>
  </g>
  <!-- Token 3: " ne" -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.3s" dur="0.2s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="204" y="216" width="48" height="36" rx="6" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1.2"/>
    <text x="228" y="239" text-anchor="middle" font-size="13" font-weight="600" fill="#44403C"> ne</text>
  </g>
  <!-- Token 4: " čita" -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.2s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="260" y="216" width="62" height="36" rx="6" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1.2"/>
    <text x="291" y="239" text-anchor="middle" font-size="13" font-weight="600" fill="#44403C"> &#x010D;ita</text>
  </g>
  <!-- Token 5: " svaku" -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.2s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="330" y="216" width="68" height="36" rx="6" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1.2"/>
    <text x="364" y="239" text-anchor="middle" font-size="13" font-weight="600" fill="#44403C"> svaku</text>
  </g>
  <!-- Token 6: " ri" -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.2s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="406" y="216" width="44" height="36" rx="6" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1.2"/>
    <text x="428" y="239" text-anchor="middle" font-size="13" font-weight="600" fill="#44403C"> ri</text>
  </g>
  <!-- Token 7: "ječ" -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.7s" dur="0.2s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="458" y="216" width="50" height="36" rx="6" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1.2"/>
    <text x="483" y="239" text-anchor="middle" font-size="13" font-weight="600" fill="#44403C">je&#x010D;</text>
  </g>
  <!-- Token 8: " zasebno." -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.2s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="516" y="216" width="96" height="36" rx="6" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1.2"/>
    <text x="564" y="239" text-anchor="middle" font-size="13" font-weight="600" fill="#44403C"> zasebno.</text>
  </g>

  <!-- Token count chip -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.9s" dur="0.3s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="650" y="220" width="94" height="28" rx="14" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1"/>
    <text x="697" y="239" text-anchor="middle" font-size="12" font-weight="600" fill="#78716C">8 tokena*</text>
  </g>

  <!-- ===== ARROW 2: tokenizacija &#x2192; prozor ===== -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.0s" dur="0.3s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <line x1="450" y1="276" x2="450" y2="288" stroke="#78716C" stroke-width="1.5" marker-end="url(#arr-stone-lp)"/>
  </g>

  <!-- ===== STAGE 3: KONTEKSTNI PROZOR (FOCAL) — box frame ===== -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="60" y="292" width="780" height="130" rx="8" fill="#FDF6EC" stroke="#B45309" stroke-width="2"/>
    <rect x="60" y="292" width="3" height="130" rx="2" fill="#B45309"/>
    <text x="80" y="312" font-size="11" font-weight="700" fill="#B45309" letter-spacing="0.8">KONTEKSTNI PROZOR</text>
    <text x="80" y="330" font-size="12" font-weight="600" fill="#92400E">Radna memorija modela &#x2014; ograni&#x010D;ene veli&#x010D;ine</text>
  </g>

  <!-- Token row 1: newest (full opacity, 30 tokens) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.5s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <g fill="#B45309">
      <rect x="80"  y="344" width="18" height="12" rx="2"/>
      <rect x="102" y="344" width="18" height="12" rx="2"/>
      <rect x="124" y="344" width="18" height="12" rx="2"/>
      <rect x="146" y="344" width="18" height="12" rx="2"/>
      <rect x="168" y="344" width="18" height="12" rx="2"/>
      <rect x="190" y="344" width="18" height="12" rx="2"/>
      <rect x="212" y="344" width="18" height="12" rx="2"/>
      <rect x="234" y="344" width="18" height="12" rx="2"/>
      <rect x="256" y="344" width="18" height="12" rx="2"/>
      <rect x="278" y="344" width="18" height="12" rx="2"/>
      <rect x="300" y="344" width="18" height="12" rx="2"/>
      <rect x="322" y="344" width="18" height="12" rx="2"/>
      <rect x="344" y="344" width="18" height="12" rx="2"/>
      <rect x="366" y="344" width="18" height="12" rx="2"/>
      <rect x="388" y="344" width="18" height="12" rx="2"/>
      <rect x="410" y="344" width="18" height="12" rx="2"/>
      <rect x="432" y="344" width="18" height="12" rx="2"/>
      <rect x="454" y="344" width="18" height="12" rx="2"/>
      <rect x="476" y="344" width="18" height="12" rx="2"/>
      <rect x="498" y="344" width="18" height="12" rx="2"/>
      <rect x="520" y="344" width="18" height="12" rx="2"/>
      <rect x="542" y="344" width="18" height="12" rx="2"/>
      <rect x="564" y="344" width="18" height="12" rx="2"/>
      <rect x="586" y="344" width="18" height="12" rx="2"/>
      <rect x="608" y="344" width="18" height="12" rx="2"/>
      <rect x="630" y="344" width="18" height="12" rx="2"/>
      <rect x="652" y="344" width="18" height="12" rx="2"/>
      <rect x="674" y="344" width="18" height="12" rx="2"/>
      <rect x="696" y="344" width="18" height="12" rx="2"/>
      <rect x="718" y="344" width="18" height="12" rx="2"/>
    </g>
    <text x="748" y="354" font-size="10" font-style="italic" fill="#92400E">&#x2190; novi</text>
  </g>

  <!-- Token row 2: slightly older (0.65 opacity, 30 tokens) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="0.65" begin="2.7s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <g fill="#B45309">
      <rect x="80"  y="362" width="18" height="12" rx="2"/>
      <rect x="102" y="362" width="18" height="12" rx="2"/>
      <rect x="124" y="362" width="18" height="12" rx="2"/>
      <rect x="146" y="362" width="18" height="12" rx="2"/>
      <rect x="168" y="362" width="18" height="12" rx="2"/>
      <rect x="190" y="362" width="18" height="12" rx="2"/>
      <rect x="212" y="362" width="18" height="12" rx="2"/>
      <rect x="234" y="362" width="18" height="12" rx="2"/>
      <rect x="256" y="362" width="18" height="12" rx="2"/>
      <rect x="278" y="362" width="18" height="12" rx="2"/>
      <rect x="300" y="362" width="18" height="12" rx="2"/>
      <rect x="322" y="362" width="18" height="12" rx="2"/>
      <rect x="344" y="362" width="18" height="12" rx="2"/>
      <rect x="366" y="362" width="18" height="12" rx="2"/>
      <rect x="388" y="362" width="18" height="12" rx="2"/>
      <rect x="410" y="362" width="18" height="12" rx="2"/>
      <rect x="432" y="362" width="18" height="12" rx="2"/>
      <rect x="454" y="362" width="18" height="12" rx="2"/>
      <rect x="476" y="362" width="18" height="12" rx="2"/>
      <rect x="498" y="362" width="18" height="12" rx="2"/>
      <rect x="520" y="362" width="18" height="12" rx="2"/>
      <rect x="542" y="362" width="18" height="12" rx="2"/>
      <rect x="564" y="362" width="18" height="12" rx="2"/>
      <rect x="586" y="362" width="18" height="12" rx="2"/>
      <rect x="608" y="362" width="18" height="12" rx="2"/>
      <rect x="630" y="362" width="18" height="12" rx="2"/>
      <rect x="652" y="362" width="18" height="12" rx="2"/>
      <rect x="674" y="362" width="18" height="12" rx="2"/>
      <rect x="696" y="362" width="18" height="12" rx="2"/>
      <rect x="718" y="362" width="18" height="12" rx="2"/>
    </g>
  </g>

  <!-- Token row 3: oldest (0.3 opacity, 16 tokens — partial fill) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="0.3" begin="2.9s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <g fill="#B45309">
      <rect x="80"  y="380" width="18" height="12" rx="2"/>
      <rect x="102" y="380" width="18" height="12" rx="2"/>
      <rect x="124" y="380" width="18" height="12" rx="2"/>
      <rect x="146" y="380" width="18" height="12" rx="2"/>
      <rect x="168" y="380" width="18" height="12" rx="2"/>
      <rect x="190" y="380" width="18" height="12" rx="2"/>
      <rect x="212" y="380" width="18" height="12" rx="2"/>
      <rect x="234" y="380" width="18" height="12" rx="2"/>
      <rect x="256" y="380" width="18" height="12" rx="2"/>
      <rect x="278" y="380" width="18" height="12" rx="2"/>
      <rect x="300" y="380" width="18" height="12" rx="2"/>
      <rect x="322" y="380" width="18" height="12" rx="2"/>
      <rect x="344" y="380" width="18" height="12" rx="2"/>
      <rect x="366" y="380" width="18" height="12" rx="2"/>
      <rect x="388" y="380" width="18" height="12" rx="2"/>
      <rect x="410" y="380" width="18" height="12" rx="2"/>
    </g>
    <text x="748" y="390" font-size="10" font-style="italic" fill="#B45309" opacity="0.5">&#x2190; stari</text>
  </g>

  <!-- Focal box bottom labels -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.1s" dur="0.3s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <text x="80" y="407" font-size="11" font-style="italic" fill="#78716C">Samo ono &#x161;to je unutar prozora je vidljivo modelu &#x2014; sve izvan njega nevidljivo.</text>
    <text x="815" y="418" text-anchor="end" font-size="10" font-style="italic" fill="#A8A29E">max ~200.000 tokena (Claude 3.5 Sonnet / Haiku)</text>
  </g>

  <!-- ===== ARROW 3: prozor &#x2192; predikcija (coffee) ===== -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.3s" dur="0.3s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <line x1="450" y1="426" x2="450" y2="438" stroke="#B45309" stroke-width="2" marker-end="url(#arr-coffee-lp)"/>
  </g>

  <!-- ===== STAGE 4: PREDIKCIJA (OUTPUT) — rise and land ===== -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.5s" dur="0.45s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <animateTransform attributeName="transform" type="translate" from="0,8" to="0,0" begin="3.5s" dur="0.45s" fill="freeze" additive="sum" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="60" y="442" width="780" height="76" rx="8" fill="#FDF6EC" stroke="#B45309" stroke-width="1"/>
    <rect x="60" y="442" width="3" height="76" rx="2" fill="#B45309"/>
    <text x="80" y="462" font-size="11" font-weight="700" fill="#B45309" letter-spacing="0.8">PREDIKCIJA</text>
    <text x="80" y="483" font-family="Merriweather, Georgia, serif" font-size="14" font-style="italic" fill="#1C1917">Na osnovu svakog tokena u prozoru, model predvi&#x0111;a</text>
    <text x="80" y="502" font-family="Merriweather, Georgia, serif" font-size="14" font-style="italic" fill="#1C1917">najvjerovatniji sljede&#x0107;i token &#x2014; i to je sve &#x161;to radi.</text>
  </g>

  <!-- ===== FOOTNOTE ===== -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.9s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <text x="450" y="535" text-anchor="middle" font-size="11" fill="#78716C" font-style="italic">* Tokenizacija je ilustrativna &#x2014; stvarna BPE segmentacija zavisi od modela i jezika.</text>
    <text x="450" y="551" text-anchor="middle" font-size="11" fill="#78716C" font-style="italic">Bosanski jezik tipično zahtijeva vi&#x161;e tokena po rije&#x010D;ima od engleskog.</text>
  </g>

  <script>
    // <![CDATA[
    (function () {
      var svg = document.getElementById('llm-proc-svg');
      var btn = svg && svg.querySelector('.replay-btn');
      if (!svg || !btn) return;
      function replay() { if (typeof svg.setCurrentTime === 'function') svg.setCurrentTime(0); }
      btn.addEventListener('click', replay);
      btn.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); replay(); }
      });
    })();
    // ]]>
  </script>

</svg>
