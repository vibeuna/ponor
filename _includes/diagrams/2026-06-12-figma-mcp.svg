<svg id="figma-mcp-svg" viewBox="0 0 900 440" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <marker id="fmcp-fwd" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 8 4, 0 8" fill="#B45309"/>
    </marker>
    <marker id="fmcp-rev" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 8 4, 0 8" fill="#78716C"/>
    </marker>
  </defs>

  <style>
    @media (prefers-reduced-motion: reduce) {
      #figma-mcp-svg animate,
      #figma-mcp-svg animateTransform { display: none; }
      #figma-mcp-svg .anim { opacity: 1 !important; }
      #figma-mcp-svg .replay-btn { display: none; }
    }
    #figma-mcp-svg:hover .replay-btn { opacity: 1; }
    #figma-mcp-svg .replay-btn:hover circle { fill: #FDF6EC; stroke: #B45309; }
    #figma-mcp-svg .replay-btn:hover path { stroke: #B45309; }
    #figma-mcp-svg .replay-btn:hover polygon { fill: #B45309; }
    #figma-mcp-svg .replay-btn:focus { outline: none; opacity: 1; }
    #figma-mcp-svg .replay-btn:focus circle { stroke: #B45309; stroke-width: 2; }
  </style>

  <!-- Background -->
  <rect width="900" height="440" fill="#FAF9F6"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle"
        font-family="Merriweather, Georgia, serif" font-size="20" font-weight="700" fill="#1C1917">
    Figma MCP: dvosmjeran handoff
  </text>
  <text x="450" y="60" text-anchor="middle"
        font-family="Inter, system-ui, -apple-system, sans-serif" font-size="13" fill="#78716C">
    MCP mijenja ulazni podatak za AI agenta — od screenshota do strukturiranih komponenti
  </text>

  <!-- Forward flow label (above boxes) -->
  <g class="anim" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.4s" fill="freeze"
             calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <text x="450" y="82" text-anchor="middle"
          font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#78716C"
          letter-spacing="0.3">
      strukturirani dizajn kontekst  →
    </text>
  </g>

  <!-- ====== FIGMA BOX (INPUT) x=60, y=95, w=220, h=140 ====== -->
  <g class="anim" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.4s" fill="freeze"
             calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="60" y="95" width="220" height="140" rx="8" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1.5"/>
    <rect x="60" y="95" width="3" height="140" rx="1" fill="#78716C"/>
    <text x="80" y="113" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11"
          font-weight="700" letter-spacing="0.8" fill="#78716C">ULAZ</text>
    <text x="80" y="136" font-family="Merriweather, Georgia, serif" font-size="16"
          font-weight="700" fill="#1C1917">Figma</text>
    <text x="80" y="158" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12"
          fill="#78716C">• komponente + varijante</text>
    <text x="80" y="176" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12"
          fill="#78716C">• design tokeni</text>
    <text x="80" y="194" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12"
          fill="#78716C">• Code Connect mapiranja</text>
    <text x="80" y="212" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12"
          fill="#78716C">• varijable</text>
  </g>

  <!-- ====== FORWARD ARROW 1: Figma → MCP ====== -->
  <g class="anim" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.9s" dur="0.3s" fill="freeze"
             calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <line x1="288" y1="165" x2="332" y2="165" stroke="#B45309" stroke-width="2"
          stroke-linecap="round" marker-end="url(#fmcp-fwd)"/>
  </g>

  <!-- ====== MCP SERVER BOX (FOCAL) x=340, y=125, w=220, h=80 ====== -->
  <g class="anim" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.4s" fill="freeze"
             calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="340" y="125" width="220" height="80" rx="8" fill="#FDF6EC" stroke="#B45309" stroke-width="2"/>
    <rect x="340" y="125" width="3" height="80" rx="1" fill="#B45309"/>
    <text x="360" y="144" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11"
          font-weight="700" letter-spacing="0.8" fill="#B45309">MCP SERVER</text>
    <text x="360" y="168" font-family="Merriweather, Georgia, serif" font-size="14"
          font-weight="700" fill="#92400E">Model Context Protocol</text>
    <text x="360" y="187" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11"
          fill="#78716C">14 klijentskih alata</text>
  </g>

  <!-- ====== FORWARD ARROW 2: MCP → Editor ====== -->
  <g class="anim" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.3s" fill="freeze"
             calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <line x1="568" y1="165" x2="612" y2="165" stroke="#B45309" stroke-width="2"
          stroke-linecap="round" marker-end="url(#fmcp-fwd)"/>
  </g>

  <!-- ====== EDITOR BOX (OUTPUT) x=620, y=95, w=220, h=140 ====== -->
  <g class="anim" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.4s" fill="freeze"
             calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="620" y="95" width="220" height="140" rx="8" fill="#FDF6EC" stroke="#B45309" stroke-width="1.5"/>
    <rect x="620" y="95" width="3" height="140" rx="1" fill="#B45309"/>
    <text x="640" y="113" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11"
          font-weight="700" letter-spacing="0.8" fill="#B45309">IZLAZ</text>
    <text x="640" y="136" font-family="Merriweather, Georgia, serif" font-size="16"
          font-weight="700" fill="#1C1917">Kod editor</text>
    <text x="640" y="158" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12"
          fill="#78716C">Cursor · VS Code · Copilot</text>
    <text x="640" y="176" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12"
          fill="#78716C">Windsurf · Replit</text>
    <text x="640" y="196" font-family="Merriweather, Georgia, serif" font-size="12"
          font-style="italic" fill="#44403C">AI generiše UI kod</text>
    <text x="640" y="214" font-family="Merriweather, Georgia, serif" font-size="12"
          font-style="italic" fill="#44403C">iz vaših komponenti</text>
  </g>

  <!-- ====== REVERSE PATH: Code to Canvas (dashed, stone) ====== -->
  <!-- Labels first so they appear with the arrow -->
  <g class="anim" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.1s" dur="0.4s" fill="freeze"
             calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <!-- Dashed curved path from Editor bottom to Figma bottom -->
    <path d="M 730,237 C 730,278, 170,278, 170,237"
          fill="none" stroke="#78716C" stroke-width="1.5" stroke-dasharray="6,4"
          stroke-linecap="round" marker-end="url(#fmcp-rev)"/>
    <!-- Labels above the curve -->
    <text x="450" y="253" text-anchor="middle"
          font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12"
          font-weight="600" fill="#78716C">← Code to Canvas</text>
    <text x="450" y="270" text-anchor="middle"
          font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11"
          font-style="italic" fill="#A8A29E">snapshot rekonstrukcija · nije sinhronizacija u realnom vremenu</text>
  </g>

  <!-- ====== EXPLANATION PANEL ====== -->
  <g class="anim" opacity="0">
    <animateTransform attributeName="transform" type="translate"
                      from="0 8" to="0 0" begin="2.5s" dur="0.5s" fill="freeze"
                      calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1" additive="sum"/>
    <animate attributeName="opacity" from="0" to="1" begin="2.5s" dur="0.5s" fill="freeze"
             calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="60" y="296" width="780" height="118" rx="8" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1.5"/>
    <rect x="72" y="309" width="3" height="14" rx="1" fill="#B45309"/>
    <text x="82" y="321" font-family="Merriweather, Georgia, serif" font-size="13"
          font-weight="700" fill="#1C1917">Zašto design system higijena postaje infrastruktura</text>
    <text x="72" y="346" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12"
          fill="#44403C">Komponente s Code Connect mapiranjima daju AI agentu materijal za kod koji se uklapa u codebase.</text>
    <text x="72" y="364" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12"
          fill="#44403C">Komponente bez mapiranja padaju na screenshot kontekst — lošiji ulaz, lošiji rezultat.</text>
    <text x="72" y="388" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11"
          font-style="italic" fill="#78716C">Agentne akcije (pisanje na canvas) naplaćuju se kao AI krediti od marta 2026. Read-only ostaje besplatan.</text>
  </g>

  <!-- Replay button -->
  <g class="replay-btn" style="cursor:pointer; opacity:0; transition: opacity 0.2s ease;"
     role="button" tabindex="0" aria-label="Pusti animaciju ponovo">
    <circle cx="855" cy="40" r="16" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1"/>
    <path d="M 855 31 A 9 9 0 1 1 846 40" fill="none" stroke="#78716C" stroke-width="1.5"
          stroke-linecap="round"/>
    <polygon points="852,28 858,28 855,33" fill="#78716C"/>
    <title>Pusti ponovo</title>
  </g>

  <script>
  // <![CDATA[
  (function () {
    var svg = document.getElementById('figma-mcp-svg');
    var btn = svg && svg.querySelector('.replay-btn');
    if (!svg || !btn) return;
    function replay() { if (typeof svg.setCurrentTime === 'function') svg.setCurrentTime(0); }
    btn.addEventListener('click', replay);
    btn.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); replay(); }
    });
  })();
  // ]]>
  </script>

</svg>
