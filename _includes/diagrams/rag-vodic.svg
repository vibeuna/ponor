<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" font-family="Inter, system-ui, -apple-system, sans-serif" id="rag-vodic-svg">
  <defs>
    <marker id="rvcoffee" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <polygon points="0,0 10,5 0,10" fill="#B45309"/>
    </marker>
    <marker id="rvstone" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0,0 10,5 0,10" fill="#78716C"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="680" fill="#FAF9F6"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="Merriweather, Georgia, serif" font-size="20" font-weight="700" fill="#1C1917">RAG pipeline: dvije faze, jedan sistem</text>
  <text x="450" y="62" text-anchor="middle" font-size="13" fill="#78716C">Indexiranje jednom · dohvatanje na svakom upitu</text>

  <!-- ═══════════════ PHASE 1 BANNER ═══════════════ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.3s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="60" y="82" width="780" height="20" rx="4" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1"/>
    <text x="80" y="97" font-size="10" font-weight="700" fill="#78716C" letter-spacing="0.8">FAZA 1 — INDEXIRANJE</text>
    <text x="830" y="97" font-size="10" fill="#A8A29E" text-anchor="end">offline · jednom</text>
  </g>

  <!-- DOKUMENTI -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.4s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="60" y="110" width="150" height="70" rx="8" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1.5"/>
    <rect x="60" y="110" width="3" height="70" fill="#78716C"/>
    <text x="80" y="130" font-size="10" font-weight="700" fill="#78716C" letter-spacing="0.8">ULAZ</text>
    <text x="80" y="152" font-size="13" font-weight="600" fill="#1C1917">Dokumenti</text>
    <text x="80" y="169" font-size="11" fill="#57534E">baza znanja</text>
  </g>

  <!-- Arrow: DOKUMENTI → CHUNKING -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.7s" dur="0.3s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <line x1="220" y1="145" x2="244" y2="145" stroke="#78716C" stroke-width="1.5" marker-end="url(#rvstone)"/>
  </g>

  <!-- CHUNKING -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.7s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="246" y="110" width="148" height="70" rx="8" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1.5"/>
    <text x="264" y="130" font-size="10" font-weight="700" fill="#78716C" letter-spacing="0.8">1. CHUNKING</text>
    <text x="264" y="152" font-size="13" font-weight="600" fill="#1C1917">256–512 tokena</text>
    <text x="264" y="169" font-size="11" fill="#57534E">po odlomku</text>
  </g>

  <!-- Arrow: CHUNKING → EMBEDDING -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.0s" dur="0.3s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <line x1="404" y1="145" x2="428" y2="145" stroke="#78716C" stroke-width="1.5" marker-end="url(#rvstone)"/>
  </g>

  <!-- EMBEDDING -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.0s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="430" y="110" width="148" height="70" rx="8" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1.5"/>
    <text x="448" y="130" font-size="10" font-weight="700" fill="#78716C" letter-spacing="0.8">2. EMBEDDING</text>
    <text x="448" y="152" font-size="13" font-weight="600" fill="#1C1917">Tekst → vektor</text>
    <text x="448" y="169" font-size="11" fill="#57534E">dense reprezentacija</text>
  </g>

  <!-- Arrow: EMBEDDING → VECTOR STORE -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.3s" dur="0.3s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <line x1="588" y1="145" x2="614" y2="145" stroke="#78716C" stroke-width="1.5" marker-end="url(#rvstone)"/>
  </g>

  <!-- VECTOR STORE (pivot: neutral but wider + taller) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.3s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="616" y="100" width="224" height="100" rx="8" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1.5"/>
    <text x="634" y="122" font-size="10" font-weight="700" fill="#78716C" letter-spacing="0.8">3. VECTOR STORE</text>
    <text x="634" y="146" font-size="13" font-weight="600" fill="#1C1917">Pohrana vektora</text>
    <text x="634" y="163" font-size="11" fill="#57534E">ANN index</text>
    <text x="634" y="179" font-size="11" fill="#57534E">pretraživ</text>
    <!-- DB cylinder icon, top-right -->
    <g transform="translate(806, 122)">
      <ellipse cx="0" cy="0" rx="12" ry="4" fill="#FDF6EC" stroke="#B45309" stroke-width="1.2"/>
      <path d="M -12 0 L -12 20 A 12 4 0 0 0 12 20 L 12 0" fill="#FDF6EC" stroke="#B45309" stroke-width="1.2"/>
      <ellipse cx="0" cy="7" rx="12" ry="4" fill="none" stroke="#B45309" stroke-width="0.7" opacity="0.4"/>
      <ellipse cx="0" cy="14" rx="12" ry="4" fill="none" stroke="#B45309" stroke-width="0.7" opacity="0.4"/>
    </g>
  </g>

  <!-- ═══════════════ PHASE DIVIDER ═══════════════ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.3s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <line x1="60" y1="224" x2="840" y2="224" stroke="#D6D3D1" stroke-width="1" stroke-dasharray="6,4"/>
    <text x="450" y="241" text-anchor="middle" font-size="11" fill="#A8A29E" font-style="italic">── na svakom upitu ──</text>
  </g>

  <!-- ═══════════════ PHASE 2 BANNER ═══════════════ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.3s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="60" y="250" width="780" height="20" rx="4" fill="#FDF6EC" stroke="#E7E5E4" stroke-width="1"/>
    <text x="80" y="265" font-size="10" font-weight="700" fill="#92400E" letter-spacing="0.8">FAZA 2 — DOHVATANJE + GENERISANJE</text>
    <text x="830" y="265" font-size="10" fill="#B45309" text-anchor="end">online · svaki upit</text>
  </g>

  <!-- UPIT KORISNIKA -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.0s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="60" y="280" width="780" height="52" rx="8" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1"/>
    <rect x="60" y="280" width="3" height="52" fill="#78716C"/>
    <text x="80" y="298" font-size="10" font-weight="700" fill="#78716C" letter-spacing="0.8">PITANJE KORISNIKA</text>
    <text x="80" y="320" font-size="14" fill="#1C1917" font-style="italic" font-family="Merriweather, Georgia, serif">"Kako da izaberem embedding model za višejezičnu dokumentaciju?"</text>
  </g>

  <!-- Arrow: UPIT → EMBED UPITA -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.3s" dur="0.3s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <line x1="222" y1="340" x2="222" y2="361" stroke="#78716C" stroke-width="1.5" marker-end="url(#rvstone)"/>
  </g>

  <!-- EMBED UPITA -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.4s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="130" y="370" width="185" height="70" rx="8" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1.5"/>
    <text x="148" y="390" font-size="10" font-weight="700" fill="#78716C" letter-spacing="0.8">4. EMBEDDING</text>
    <text x="148" y="411" font-size="13" font-weight="600" fill="#1C1917">Upit → vektor</text>
    <text x="148" y="428" font-size="11" fill="#57534E">isti model!</text>
  </g>

  <!-- Arrow: EMBED UPITA → ANN PRETRAGA -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.6s" dur="0.3s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <line x1="325" y1="405" x2="337" y2="405" stroke="#78716C" stroke-width="1.5" marker-end="url(#rvstone)"/>
  </g>

  <!-- ANN PRETRAGA (wider center) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.6s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="339" y="370" width="252" height="70" rx="8" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1.5"/>
    <text x="357" y="390" font-size="10" font-weight="700" fill="#78716C" letter-spacing="0.8">5. ANN PRETRAGA</text>
    <text x="357" y="411" font-size="13" font-weight="600" fill="#1C1917">Pretraži vector store</text>
    <text x="357" y="428" font-size="11" fill="#57534E">k = 3–10 chunkova</text>
  </g>

  <!-- Arrow: ANN PRETRAGA → TOP-K -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.8s" dur="0.3s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <line x1="601" y1="405" x2="613" y2="405" stroke="#78716C" stroke-width="1.5" marker-end="url(#rvstone)"/>
  </g>

  <!-- TOP-K CHUNKOVI -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.8s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="615" y="370" width="215" height="70" rx="8" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1.5"/>
    <text x="633" y="390" font-size="10" font-weight="700" fill="#78716C" letter-spacing="0.8">6. TOP-K CHUNKOVI</text>
    <text x="633" y="411" font-size="13" font-weight="600" fill="#1C1917">Dohvaćeni odlomci</text>
    <text x="633" y="428" font-size="11" fill="#57534E">relevantni tekst</text>
  </g>

  <!-- ═══════════════ CONVERGENCE ═══════════════ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>

    <!-- Left rail: original question exits UPIT left side (x=80), runs down, joins junction -->
    <path d="M 80 332 L 80 480 L 450 480" fill="none" stroke="#78716C" stroke-width="1.3" stroke-dasharray="4,3"/>

    <!-- Right rail: retrieved chunks exit TOP-K center (x=722), run down, join junction -->
    <path d="M 722 440 L 722 480 L 450 480" fill="none" stroke="#B45309" stroke-width="2"/>

    <!-- Junction circle -->
    <circle cx="450" cy="480" r="4" fill="#B45309"/>

    <!-- Arrow: junction → LLM -->
    <line x1="450" y1="484" x2="450" y2="500" stroke="#B45309" stroke-width="2" marker-end="url(#rvcoffee)"/>

    <!-- Rail labels -->
    <text x="258" y="473" font-size="10" fill="#78716C" font-style="italic" text-anchor="middle">izvorno pitanje</text>
    <text x="590" y="473" font-size="10" fill="#92400E" font-style="italic" font-weight="600" text-anchor="middle">+ dohvaćeni kontekst</text>
  </g>

  <!-- ═══════════════ LLM (focal element) ═══════════════ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.3s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="320" y="504" width="260" height="56" rx="8" fill="#FDF6EC" stroke="#B45309" stroke-width="1.5"/>
    <rect x="320" y="504" width="3" height="56" fill="#B45309"/>
    <text x="338" y="524" font-size="10" font-weight="700" fill="#B45309" letter-spacing="0.8">7. LLM</text>
    <text x="338" y="546" font-size="13" font-weight="600" fill="#1C1917">Odgovor temeljen na kontekstu</text>
  </g>

  <!-- Arrow: LLM → ODGOVOR -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.6s" dur="0.3s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <line x1="450" y1="564" x2="450" y2="582" stroke="#B45309" stroke-width="2" marker-end="url(#rvcoffee)"/>
  </g>

  <!-- ═══════════════ ODGOVOR (rise + fade) ═══════════════ -->
  <g opacity="0" transform="translate(0,8)">
    <animate attributeName="opacity" from="0" to="1" begin="3.8s" dur="0.5s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <animateTransform attributeName="transform" type="translate" values="0 8;0 0" begin="3.8s" dur="0.5s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1" keyTimes="0;1"/>
    <rect x="60" y="590" width="780" height="68" rx="8" fill="#FDF6EC" stroke="#B45309" stroke-width="1"/>
    <rect x="60" y="590" width="3" height="68" fill="#B45309"/>
    <text x="80" y="612" font-size="10" font-weight="700" fill="#B45309" letter-spacing="0.8">ODGOVOR</text>
    <text x="80" y="634" font-size="14" fill="#1C1917" font-family="Merriweather, Georgia, serif">Za višejezičnu dokumentaciju, bge-m3 je bolji izbor od text-embedding-ada-002 —</text>
    <text x="80" y="652" font-size="14" fill="#1C1917" font-family="Merriweather, Georgia, serif">nativno podržava višejezično embedovanje bez prijevoda upita.</text>
  </g>

  <!-- Replay button -->
  <g class="replay-btn" style="cursor:pointer; opacity:0; transition: opacity 0.2s ease;" role="button" tabindex="0" aria-label="Pusti animaciju ponovo">
    <circle cx="855" cy="40" r="16" fill="#F5F5F0" stroke="#E7E5E4" stroke-width="1"/>
    <path d="M 855 31 A 9 9 0 1 1 846 40" fill="none" stroke="#78716C" stroke-width="1.5" stroke-linecap="round"/>
    <polygon points="852,28 858,28 855,33" fill="#78716C"/>
    <title>Pusti ponovo</title>
  </g>

  <style>
    #rag-vodic-svg:hover .replay-btn { opacity: 1; }
    #rag-vodic-svg .replay-btn:hover circle { fill: #FDF6EC; stroke: #B45309; }
    #rag-vodic-svg .replay-btn:hover path { stroke: #B45309; }
    #rag-vodic-svg .replay-btn:hover polygon { fill: #B45309; }
    #rag-vodic-svg .replay-btn:focus { outline: none; opacity: 1; }
    #rag-vodic-svg .replay-btn:focus circle { stroke: #B45309; stroke-width: 2; }
    @media (prefers-reduced-motion: reduce) {
      #rag-vodic-svg animate,
      #rag-vodic-svg animateTransform { display: none; }
      #rag-vodic-svg .replay-btn { display: none; }
    }
  </style>

  <script>
    // <![CDATA[
    (function () {
      const svg = document.getElementById('rag-vodic-svg');
      const btn = svg && svg.querySelector('.replay-btn');
      if (!svg || !btn) return;
      function replay() { if (typeof svg.setCurrentTime === 'function') svg.setCurrentTime(0); }
      btn.addEventListener('click', replay);
      btn.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); replay(); }
      });
    })();
    // ]]>
  </script>
</svg>
