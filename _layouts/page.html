---
layout: default
---
<section id="main-content" class="pt-10 pb-8 px-4 sm:px-6 lg:px-8">
    <div class="max-w-3xl mx-auto text-center">
        <div class="w-20 h-20 bg-coffee/10 rounded-2xl flex items-center justify-center mx-auto mb-6">
            <svg class="w-10 h-10 text-coffee" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </div>
        <h1 class="text-4xl md:text-5xl font-bold text-ink mb-6">{{ page.title }}</h1>
        {% if page.subtitle %}<p class="text-xl text-stone dark:text-[#A8A29E] leading-relaxed max-w-2xl mx-auto">{{ page.subtitle }}</p>{% endif %}
    </div>
</section>

<section class="py-8 px-4 sm:px-6 lg:px-8">
    <div class="max-w-3xl mx-auto">
        <div class="about-body">
            {{ content }}
        </div>
    </div>
</section>

{% include newsletter.html %}
