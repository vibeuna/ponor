title: "ponor.ba"
description: "Jednostavni vodiči, aktualne vijesti i praktični savjeti o LLM modelima i AI alatima na bosanskom jeziku. Svaki dan novi sadržaj."
url: "https://www.ponor.ba"
baseurl: ""
lang: bs
title_separator: "—"

author:
  name: "Dino"
  email: "vibeuna@gmail.com"

# Newsletter signup (MailerLite custom HTML form).
# action: the form's subscribe endpoint
#   (from MailerLite: Forms -> Embedded form -> HTML snippet -> the <form action=...> URL)
# email_field: name of the email input the provider expects
#   (MailerLite: "fields[email]", Buttondown: "email")
# While action is empty, the site shows an RSS follow block instead of the form.
newsletter:
  action: "https://assets.mailerlite.com/jsonp/2511666/forms/193067898519946836/subscribe"
  email_field: "fields[email]"

# Privacy-friendly analytics (GoatCounter, goatcounter.com — no cookies).
# Set to your site code (the <code> in https://<code>.goatcounter.com).
# While empty, no analytics script is emitted.
goatcounter: "ponor"

permalink: /clanci/:slug/
future: true

markdown: kramdown
kramdown:
  input: GFM

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - reference_static_web/
  - scripts/
  - tailwind.config.js
  - tailwind.input.css
